<svg viewBox="0 0 1200 860" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif"><defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" fill="none" stroke="#efe8db" stroke-width="1"/></pattern>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="3" stdDeviation="4.5" flood-color="#3c2d14" flood-opacity=".11"/></filter>
    <marker id="a" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#6d3fd4"/></marker><marker id="g" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#1a7d52"/></marker><marker id="o" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#bc5a16"/></marker><marker id="t" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#1474a6"/></marker><marker id="k" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#6b6357"/></marker>
  </defs><rect width="1200" height="860" rx="20" fill="#fffdf8"/><rect width="1200" height="860" rx="20" fill="url(#grid)" opacity=".7"/><text x="54" y="52" text-anchor="start" font-size="23" font-weight="800" fill="#221f1a">Agent 是怎么工作的 — 分步走查</text><text x="54" y="80" text-anchor="start" font-size="13.5" font-weight="400" fill="#6b6357">Harness 运行这个循环。由 LLM 做选择；typed contract、policy gate 与 verifier 保证它安全、不跑偏。</text><rect x="300" y="108" width="520" height="58" rx="13" fill="#fff" stroke="#6d3fd4" stroke-width="1.2" opacity="1"/><circle cx="330" cy="137" r="16" fill="#1a7d52" stroke="#fff" stroke-width="2"/><text x="330" y="138" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="800" fill="#fff">1</text><text x="360" y="132" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">读懂目标</text><text x="360" y="150" text-anchor="start" font-size="10.8" font-weight="400" fill="#6b6357">读取用户的请求与约束；想清楚“做完”长什么样。</text><rect x="300" y="180" width="520" height="58" rx="13" fill="#fff" stroke="#6d3fd4" stroke-width="1.2" opacity="1"/><circle cx="330" cy="209" r="16" fill="#1a7d52" stroke="#fff" stroke-width="2"/><text x="330" y="210" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="800" fill="#fff">2</text><text x="360" y="204" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">挑选 skill</text><text x="360" y="222" text-anchor="start" font-size="10.8" font-weight="400" fill="#6b6357">选出合适的 SkillSpec，加载它的输入/输出 schema。</text><rect x="300" y="252" width="520" height="58" rx="13" fill="#fff" stroke="#6d3fd4" stroke-width="1.2" opacity="1"/><circle cx="330" cy="281" r="16" fill="#1474a6" stroke="#fff" stroke-width="2"/><text x="330" y="282" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="800" fill="#fff">3</text><text x="360" y="276" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">收集上下文</text><text x="360" y="294" text-anchor="start" font-size="10.8" font-weight="400" fill="#6b6357">拉入记忆、相关示例（shots）和工具的契约。</text><rect x="300" y="324" width="520" height="58" rx="13" fill="#f4eeff" stroke="#6d3fd4" stroke-width="1.7" opacity="1"/><circle cx="330" cy="353" r="16" fill="#6d3fd4" stroke="#fff" stroke-width="2"/><text x="330" y="354" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="800" fill="#fff">4</text><text x="360" y="348" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">制定计划</text><text x="360" y="366" text-anchor="start" font-size="10.8" font-weight="400" fill="#6b6357">LLM 起草带 fallback 和明确停止条件的计划。</text><rect x="300" y="396" width="520" height="58" rx="13" fill="#f4eeff" stroke="#6d3fd4" stroke-width="1.7" opacity="1"/><circle cx="330" cy="425" r="16" fill="#6d3fd4" stroke="#fff" stroke-width="2"/><text x="330" y="426" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="800" fill="#fff">5</text><text x="360" y="420" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">选择下一步动作</text><text x="360" y="438" text-anchor="start" font-size="10.8" font-weight="400" fill="#6b6357">为这一步选 tool（O1）、模型（O7）和 token 预算（O8）。</text><rect x="300" y="468" width="520" height="58" rx="13" fill="#fff" stroke="#6d3fd4" stroke-width="1.2" opacity="1"/><circle cx="330" cy="497" r="16" fill="#6d3fd4" stroke="#fff" stroke-width="2"/><text x="330" y="498" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="800" fill="#fff">6</text><text x="360" y="492" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">先检查，再执行</text><text x="360" y="510" text-anchor="start" font-size="10.8" font-weight="400" fill="#6b6357">policy gate 校验范围与权限，然后在 Scaffold 执行 / 查询</text><text x="360" y="523" text-anchor="start" font-size="10.8" font-weight="400" fill="#6b6357"> Data。</text><rect x="300" y="540" width="520" height="58" rx="13" fill="#fff" stroke="#6d3fd4" stroke-width="1.2" opacity="1"/><circle cx="330" cy="569" r="16" fill="#6d3fd4" stroke="#fff" stroke-width="2"/><text x="330" y="570" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="800" fill="#fff">7</text><text x="360" y="564" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">观察并打分</text><text x="360" y="582" text-anchor="start" font-size="10.8" font-weight="400" fill="#6b6357">收集结果与证据；verifier / reward 给它打分。</text><rect x="300" y="612" width="520" height="58" rx="13" fill="#f4eeff" stroke="#6d3fd4" stroke-width="1.7" opacity="1"/><circle cx="330" cy="641" r="16" fill="#bc5a16" stroke="#fff" stroke-width="2"/><text x="330" y="642" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="800" fill="#fff">8</text><text x="360" y="636" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">够好了吗？</text><text x="360" y="654" text-anchor="start" font-size="10.8" font-weight="400" fill="#6b6357">够好 → 交付结果。   不够 → 反思、修订计划，回到第 5 步。</text><path d="M560 166 L560 180" fill="none" stroke="#6d3fd4" stroke-width="1.9" marker-end="url(#a)"/><path d="M560 238 L560 252" fill="none" stroke="#6d3fd4" stroke-width="1.9" marker-end="url(#a)"/><path d="M560 310 L560 324" fill="none" stroke="#6d3fd4" stroke-width="1.9" marker-end="url(#a)"/><path d="M560 382 L560 396" fill="none" stroke="#6d3fd4" stroke-width="1.9" marker-end="url(#a)"/><path d="M560 454 L560 468" fill="none" stroke="#6d3fd4" stroke-width="1.9" marker-end="url(#a)"/><path d="M560 526 L560 540" fill="none" stroke="#6d3fd4" stroke-width="1.9" marker-end="url(#a)"/><path d="M560 598 L560 612" fill="none" stroke="#6d3fd4" stroke-width="1.9" marker-end="url(#a)"/><path d="M150 137 L300 137" fill="none" stroke="#6b6357" stroke-width="1.6" marker-end="url(#k)"/><text x="144" y="127" text-anchor="start" font-size="13" font-weight="400" fill="#221f1a"></text><rect x="874" y="428" width="270" height="86" rx="13" fill="#fbe7d3" stroke="#bc5a16" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="892" y="452" text-anchor="start" font-size="14" font-weight="800" fill="#9a4d12">Scaffold</text><text x="892" y="472" text-anchor="start" font-size="10.8" font-weight="400" fill="#9a4d12">sandbox · shell · serving</text><text x="892" y="490" text-anchor="start" font-size="10.8" font-weight="400" fill="#9a4d12">filesystem · network · SSO/cloud</text><rect x="874" y="530" width="270" height="86" rx="13" fill="#ddeff8" stroke="#1474a6" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="892" y="554" text-anchor="start" font-size="14" font-weight="800" fill="#0f5e87">数据子系统 𝒟</text><text x="892" y="574" text-anchor="start" font-size="10.8" font-weight="400" fill="#3d7a99">D₁/D₂ 查询 · D₃/D₄ 策略</text><text x="892" y="592" text-anchor="start" font-size="10.8" font-weight="400" fill="#3d7a99">Ω workspace 证据</text><path d="M820 489 L874 471" fill="none" stroke="#bc5a16" stroke-width="1.8" marker-end="url(#o)"/><path d="M820 505 L845 505 L845 573 L874 573" fill="none" stroke="#1474a6" stroke-width="1.8" marker-end="url(#t)"/><rect x="874" y="612" width="270" height="58" rx="13" fill="#eaf7f0" stroke="#1a7d52" stroke-width="1.5" opacity="1"/><text x="1009" y="641" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="800" fill="#11603d">交付产物</text><path d="M820 641 L874 641" fill="none" stroke="#1a7d52" stroke-width="1.9" marker-end="url(#g)"/><path d="M300 641 L150 641 L150 425 L300 425" fill="none" stroke="#bc5a16" stroke-width="1.9" stroke-dasharray="6 5" marker-end="url(#o)"/><text x="158" y="504" text-anchor="start" font-size="10.5" font-weight="700" fill="#bc5a16">反思并回到第 5 步</text><rect x="300" y="708" width="844" height="48" rx="12" fill="#f1ebe0" stroke="#6d3fd4" stroke-width="1.2" stroke-dasharray="6 6" opacity="1"/><text x="318" y="737" text-anchor="start" font-size="11.5" font-weight="400" fill="#4f2da0">在后台静默运行：System skills (M) 在步骤之间做记忆压缩、写回与检索。</text></svg>