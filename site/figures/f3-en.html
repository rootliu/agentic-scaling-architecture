<body><div id="p"><svg viewBox="0 0 1200 860" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif"><defs>

  </defs><rect width="1200" height="860" rx="20" fill="#fffdf8"/><rect width="1200" height="860" rx="20" fill="url(#grid)" opacity=".7"/><text x="54" y="52" text-anchor="start" font-size="23" font-weight="800" fill="#221f1a">How the Agent Works — a Step-by-Step Walkthrough</text><text x="54" y="80" text-anchor="start" font-size="13.5" font-weight="400" fill="#6b6357">The Harness runs this loop. The LLM makes the choices; typed contracts, a policy gate and a verifier keep it safe and on track.</text><rect x="300" y="108" width="520" height="58" rx="13" fill="#fff" stroke="#6d3fd4" stroke-width="1.2" opacity="1"/><circle cx="330" cy="137" r="16" fill="#1a7d52" stroke="#fff" stroke-width="2"/><text x="330" y="138" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="800" fill="#fff">1</text><text x="360" y="132" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">Understand the goal</text><text x="360" y="150" text-anchor="start" font-size="10.8" font-weight="400" fill="#6b6357">Read the user’s request and constraints; figure out what “done” looks</text><text x="360" y="163" text-anchor="start" font-size="10.8" font-weight="400" fill="#6b6357">like.</text><rect x="300" y="180" width="520" height="58" rx="13" fill="#fff" stroke="#6d3fd4" stroke-width="1.2" opacity="1"/><circle cx="330" cy="209" r="16" fill="#1a7d52" stroke="#fff" stroke-width="2"/><text x="330" y="210" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="800" fill="#fff">2</text><text x="360" y="204" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">Pick the skill</text><text x="360" y="222" text-anchor="start" font-size="10.8" font-weight="400" fill="#6b6357">Choose the SkillSpec that fits and load its input/output schema.</text><rect x="300" y="252" width="520" height="58" rx="13" fill="#fff" stroke="#6d3fd4" stroke-width="1.2" opacity="1"/><circle cx="330" cy="281" r="16" fill="#1474a6" stroke="#fff" stroke-width="2"/><text x="330" y="282" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="800" fill="#fff">3</text><text x="360" y="276" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">Gather context</text><text x="360" y="294" text-anchor="start" font-size="10.8" font-weight="400" fill="#6b6357">Pull in memory, relevant examples (shots) and the tools’ contracts.</text><rect x="300" y="324" width="520" height="58" rx="13" fill="#f4eeff" stroke="#6d3fd4" stroke-width="1.7" opacity="1"/><circle cx="330" cy="353" r="16" fill="#6d3fd4" stroke="#fff" stroke-width="2"/><text x="330" y="354" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="800" fill="#fff">4</text><text x="360" y="348" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">Make a plan</text><text x="360" y="366" text-anchor="start" font-size="10.8" font-weight="400" fill="#6b6357">The LLM drafts a plan with fallbacks and a clear stop condition.</text><rect x="300" y="396" width="520" height="58" rx="13" fill="#f4eeff" stroke="#6d3fd4" stroke-width="1.7" opacity="1"/><circle cx="330" cy="425" r="16" fill="#6d3fd4" stroke="#fff" stroke-width="2"/><text x="330" y="426" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="800" fill="#fff">5</text><text x="360" y="420" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">Choose the next action</text><text x="360" y="438" text-anchor="start" font-size="10.8" font-weight="400" fill="#6b6357">Pick the tool (O1), the model (O7) and the token budget (O8) for this</text><text x="360" y="451" text-anchor="start" font-size="10.8" font-weight="400" fill="#6b6357">step.</text><rect x="300" y="468" width="520" height="58" rx="13" fill="#fff" stroke="#6d3fd4" stroke-width="1.2" opacity="1"/><circle cx="330" cy="497" r="16" fill="#6d3fd4" stroke="#fff" stroke-width="2"/><text x="330" y="498" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="800" fill="#fff">6</text><text x="360" y="492" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">Check, then run</text><text x="360" y="510" text-anchor="start" font-size="10.8" font-weight="400" fill="#6b6357">Policy gate checks scope &amp; permissions, then it runs on Scaffold / queries</text><text x="360" y="523" text-anchor="start" font-size="10.8" font-weight="400" fill="#6b6357">Data.</text><rect x="300" y="540" width="520" height="58" rx="13" fill="#fff" stroke="#6d3fd4" stroke-width="1.2" opacity="1"/><circle cx="330" cy="569" r="16" fill="#6d3fd4" stroke="#fff" stroke-width="2"/><text x="330" y="570" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="800" fill="#fff">7</text><text x="360" y="564" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">Observe &amp; score</text><text x="360" y="582" text-anchor="start" font-size="10.8" font-weight="400" fill="#6b6357">Collect the result and evidence; a verifier / reward grades how good it</text><text x="360" y="595" text-anchor="start" font-size="10.8" font-weight="400" fill="#6b6357">is.</text><rect x="300" y="612" width="520" height="58" rx="13" fill="#f4eeff" stroke="#6d3fd4" stroke-width="1.7" opacity="1"/><circle cx="330" cy="641" r="16" fill="#bc5a16" stroke="#fff" stroke-width="2"/><text x="330" y="642" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="800" fill="#fff">8</text><text x="360" y="636" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">Good enough?</text><text x="360" y="654" text-anchor="start" font-size="10.8" font-weight="400" fill="#6b6357">Yes → deliver the result. No → reflect, revise the plan, and loop back to</text><text x="360" y="667" text-anchor="start" font-size="10.8" font-weight="400" fill="#6b6357">step 5.</text><path d="M560 166 L560 180" fill="none" stroke="#6d3fd4" stroke-width="1.9" marker-end="url(#a)"/><path d="M560 238 L560 252" fill="none" stroke="#6d3fd4" stroke-width="1.9" marker-end="url(#a)"/><path d="M560 310 L560 324" fill="none" stroke="#6d3fd4" stroke-width="1.9" marker-end="url(#a)"/><path d="M560 382 L560 396" fill="none" stroke="#6d3fd4" stroke-width="1.9" marker-end="url(#a)"/><path d="M560 454 L560 468" fill="none" stroke="#6d3fd4" stroke-width="1.9" marker-end="url(#a)"/><path d="M560 526 L560 540" fill="none" stroke="#6d3fd4" stroke-width="1.9" marker-end="url(#a)"/><path d="M560 598 L560 612" fill="none" stroke="#6d3fd4" stroke-width="1.9" marker-end="url(#a)"/><path d="M150 137 L300 137" fill="none" stroke="#6b6357" stroke-width="1.6" marker-end="url(#k)"/><text x="144" y="127" text-anchor="start" font-size="13" font-weight="400" fill="#221f1a"></text><rect x="874" y="428" width="270" height="86" rx="13" fill="#fbe7d3" stroke="#bc5a16" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="892" y="452" text-anchor="start" font-size="14" font-weight="800" fill="#9a4d12">Scaffold</text><text x="892" y="472" text-anchor="start" font-size="10.8" font-weight="400" fill="#9a4d12">sandbox · shell · serving</text><text x="892" y="490" text-anchor="start" font-size="10.8" font-weight="400" fill="#9a4d12">filesystem · network · SSO/cloud</text><rect x="874" y="530" width="270" height="86" rx="13" fill="#ddeff8" stroke="#1474a6" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="892" y="554" text-anchor="start" font-size="14" font-weight="800" fill="#0f5e87">Data subsystem 𝒟</text><text x="892" y="574" text-anchor="start" font-size="10.8" font-weight="400" fill="#3d7a99">D₁/D₂ query · D₃/D₄ policy</text><text x="892" y="592" text-anchor="start" font-size="10.8" font-weight="400" fill="#3d7a99">Ω workspace evidence</text><path d="M820 489 L874 471" fill="none" stroke="#bc5a16" stroke-width="1.8" marker-end="url(#o)"/><path d="M820 505 L845 505 L845 573 L874 573" fill="none" stroke="#1474a6" stroke-width="1.8" marker-end="url(#t)"/><rect x="874" y="612" width="270" height="58" rx="13" fill="#eaf7f0" stroke="#1a7d52" stroke-width="1.5" opacity="1"/><text x="1009" y="641" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="800" fill="#11603d">Deliver artifact</text><path d="M820 641 L874 641" fill="none" stroke="#1a7d52" stroke-width="1.9" marker-end="url(#g)"/><path d="M300 641 L150 641 L150 425 L300 425" fill="none" stroke="#bc5a16" stroke-width="1.9" stroke-dasharray="6 5" marker-end="url(#o)"/><text x="158" y="504" text-anchor="start" font-size="10.5" font-weight="700" fill="#bc5a16">reflect &amp; loop back to 5</text><rect x="300" y="708" width="844" height="48" rx="12" fill="#f1ebe0" stroke="#6d3fd4" stroke-width="1.2" stroke-dasharray="6 6" opacity="1"/><text x="318" y="737" text-anchor="start" font-size="11.5" font-weight="400" fill="#4f2da0">Running quietly in the background: System skills (M) compact, write back and retrieve memory between steps.</text></svg></div></body></html>
