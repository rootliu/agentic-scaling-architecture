<svg viewBox="0 0 1200 860" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif"><defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" fill="none" stroke="#efe8db" stroke-width="1"/></pattern>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="3" stdDeviation="4.5" flood-color="#3c2d14" flood-opacity=".11"/></filter>
    <marker id="a" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#6d3fd4"/></marker><marker id="g" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#1a7d52"/></marker><marker id="o" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#bc5a16"/></marker><marker id="t" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#1474a6"/></marker><marker id="k" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#6b6357"/></marker>
  </defs><rect width="1200" height="860" rx="20" fill="#fffdf8"/><rect width="1200" height="860" rx="20" fill="url(#grid)" opacity=".7"/><text x="54" y="52" text-anchor="start" font-size="23" font-weight="800" fill="#221f1a">Code as the Contract — How Harness Turns a Plan into Action</text><text x="54" y="80" text-anchor="start" font-size="13.5" font-weight="400" fill="#6b6357">The LLM writes the orchestration code (probabilistic); the runtime runs it (deterministic &amp; auditable). That generated code IS the “deterministic kernel”.</text><rect x="70" y="120" width="470" height="470" rx="16" fill="#f7f2ff" stroke="#6d3fd4" stroke-width="1.3" stroke-dasharray="6 5" opacity="1"/><rect x="660" y="120" width="470" height="470" rx="16" fill="#fff6ee" stroke="#bc5a16" stroke-width="1.3" stroke-dasharray="6 5" opacity="1"/><text x="90" y="146" text-anchor="start" font-size="12" font-weight="800" fill="#4f2da0">PROBABILISTIC — LLM authors</text><text x="680" y="146" text-anchor="start" font-size="12" font-weight="800" fill="#9a4d12">DETERMINISTIC — runtime executes</text><rect x="100" y="170" width="410" height="66" rx="12" fill="#fff" stroke="#6d3fd4" stroke-width="1.2" opacity="1"/><text x="118" y="196" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">Plan</text><text x="118" y="216" text-anchor="start" font-size="10.6" font-weight="400" fill="#6b6357">NL sub-goal DAG · acceptance by PRD</text><rect x="100" y="266" width="410" height="66" rx="12" fill="#fff" stroke="#6d3fd4" stroke-width="1.2" opacity="1"/><text x="118" y="292" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">Tool fan-out</text><text x="118" y="312" text-anchor="start" font-size="10.6" font-weight="400" fill="#6b6357">many candidate calls per sub-goal (LLM-driven)</text><rect x="100" y="362" width="410" height="66" rx="12" fill="#f4eeff" stroke="#6d3fd4" stroke-width="1.7" opacity="1"/><text x="118" y="388" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">Generate orchestration code</text><text x="118" y="408" text-anchor="start" font-size="10.6" font-weight="400" fill="#6b6357">dispatch + sub-agent dependency graph</text><path d="M305 236 L305 266" fill="none" stroke="#6d3fd4" stroke-width="2.1" marker-end="url(#a)"/><path d="M305 332 L305 362" fill="none" stroke="#6d3fd4" stroke-width="2.1" marker-end="url(#a)"/><rect x="690" y="200" width="410" height="66" rx="12" fill="#fbe7d3" stroke="#bc5a16" stroke-width="1.2" opacity="1"/><text x="708" y="226" text-anchor="start" font-size="13.5" font-weight="800" fill="#9a4d12">Sub-agents run in parallel</text><text x="708" y="246" text-anchor="start" font-size="10.6" font-weight="400" fill="#6b6357">on Scaffold (isolated)</text><rect x="690" y="320" width="410" height="66" rx="12" fill="#f4eeff" stroke="#6d3fd4" stroke-width="1.7" opacity="1"/><text x="708" y="346" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">Verify + select</text><text x="708" y="366" text-anchor="start" font-size="10.6" font-weight="400" fill="#6b6357">keep the best candidate; replayable trace</text><path d="M895 266 L895 320" fill="none" stroke="#bc5a16" stroke-width="2.1" marker-end="url(#o)"/><path d="M510 395 L600 395 L600 233 L690 233" fill="none" stroke="#6d3fd4" stroke-width="2.2" marker-end="url(#a)"/><text x="566" y="385" text-anchor="start" font-size="11" font-weight="800" fill="#4f2da0" font-family="ui-monospace,Menlo,monospace">code</text><path d="M690 353 L610 353 L610 110 L305 110 L305 170" fill="none" stroke="#bc5a16" stroke-width="1.5" stroke-dasharray="6 5" marker-end="url(#a)"/><text x="300" y="104" text-anchor="start" font-size="10.5" font-weight="700" fill="#bc5a16">not good enough → revise plan</text><rect x="70" y="470" width="1060" height="54" rx="13" fill="#e6f4ec" stroke="#1a7d52" stroke-width="1.4" opacity="1"/><text x="88" y="492" text-anchor="start" font-size="13" font-weight="800" fill="#11603d">Skill = crystallized code-loop</text><text x="88" y="510" text-anchor="start" font-size="11" font-weight="400" fill="#2c5e47">shots + causal trace + reward → integrated tool, shared across users</text><path d="M895 386 L895 470" fill="none" stroke="#1a7d52" stroke-width="1.8" marker-end="url(#g)"/><text x="905" y="408" text-anchor="start" font-size="10" font-weight="400" fill="#11603d">reward-gated success → crystallize as a Skill (code-loop)</text><rect x="70" y="536" width="1060" height="40" rx="11" fill="#f1ebe0" stroke="#6d3fd4" stroke-width="1.2" stroke-dasharray="6 6" opacity="1"/><text x="600" y="556" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#4f2da0">Skill ⊥ Harness — coupled only through the code-loop; each side iterates on its own</text></svg>