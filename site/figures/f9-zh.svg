  </defs><rect width="1200" height="980" rx="20" fill="#fffdf8"/><rect width="1200" height="980" rx="20" fill="url(#grid)" opacity=".7"/><text x="54" y="50" text-anchor="start" font-size="22" font-weight="800" fill="#221f1a">Data Wiki 构建 — 常规数据源自动化 + 复杂报表人机协同校验</text><text x="54" y="76" text-anchor="start" font-size="13" font-weight="400" fill="#6b6357">承 D2：常规数据源由 off-policy loop 自动读取总结；复杂报表（多 sheet / 口径漂移）</text><text x="54" y="95" text-anchor="start" font-size="13" font-weight="400" fill="#6b6357">则与人协同定规范，并用人常备报表作参照物，经还原式 reflection 校验总结质量。</text><text x="54" y="128" text-anchor="start" font-size="13" font-weight="800" fill="#0f5e87">① 常规数据源（数据库/API/日志）</text><rect x="54" y="144" width="200" height="66" rx="12" fill="#fff" stroke="#cabfa8" stroke-width="1.4" opacity="1" filter="url(#sh)"/><text x="70" y="170" text-anchor="start" font-size="13" font-weight="800" fill="#221f1a">数据源 src</text><text x="70" y="190" text-anchor="start" font-size="10" font-weight="400" fill="#6b6357">结构化/半结构化</text><text x="70" y="205" text-anchor="start" font-size="10" font-weight="400" fill="#6b6357">可编程访问</text><path d="M254 177 L326 177" fill="none" stroke="#1474a6" stroke-width="2.1" marker-end="url(#a)"/><rect x="326" y="144" width="300" height="66" rx="12" fill="#ddeff8" stroke="#1474a6" stroke-width="1.7" opacity="1" filter="url(#sh)"/><text x="342" y="170" text-anchor="start" font-size="13" font-weight="800" fill="#0f5e87">D2 off-policy loop：读取</text><text x="342" y="190" text-anchor="start" font-size="10" font-weight="400" fill="#0f5e87">search 结构/内容/latent-fields</text><text x="342" y="205" text-anchor="start" font-size="10" font-weight="400" fill="#0f5e87">（异步 batch，不占主请求路径）</text><path d="M476 210 L476 242" fill="none" stroke="#1474a6" stroke-width="2.1" marker-end="url(#a)"/><rect x="54" y="244" width="706" height="110" rx="12" fill="#fbfaf6" stroke="#e6dfd1" stroke-width="1.6" opacity="1" filter="url(#sh)"/><text x="70" y="268" text-anchor="start" font-size="12" font-wei