 y="224" width="104" height="64" rx="9" fill="#e3f4f0" stroke="#0f7a6b" stroke-width="1.4" opacity="1"/><text x="712" y="246" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="800" fill="#0b5e53">Who</text><text x="712" y="266" text-anchor="middle" dominant-baseline="middle" font-size="8.6" font-weight="400" fill="#0b5e53">数据拥有者/授权</text><rect x="436" y="296" width="104" height="64" rx="9" fill="#fbe7d3" stroke="#bc5a16" stroke-width="1.4" opacity="1"/><text x="488" y="318" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="800" fill="#9a4d12">What</text><text x="488" y="338" text-anchor="middle" dominant-baseline="middle" font-size="8.6" font-weight="400" fill="#9a4d12">数据语义(=Σ)</text><rect x="548" y="296" width="104" height="64" rx="9" fill="#e6f4ec" stroke="#1a7d52" stroke-width="1.4" opacity="1"/><text x="600" y="318" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="800" fill="#11603d">Why</text><text x="600" y="338" text-anchor="middle" dominant-baseline="middle" font-size="8.6" font-weight="400" fill="#11603d">集成逻辑(join 理由)</text><rect x="660" y="296" width="104" height="64" rx="9" fill="#ece4fb" stroke="#6d3fd4" stroke-width="1.4" opacity="1"/><text x="712" y="318" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="800" fill="#4f2da0">How</text><text x="712" y="338" text-anchor="middle" dominant-baseline="middle" font-size="8.6" font-weight="400" fill="#4f2da0">物理访问方式</text><path d="M400 298 L432 298" fill="none" stroke="#1474a6" stroke-width="1.9" marker-end="url(#a)"/><text x="386" y="288" text-anchor="start" font-size="10" font-weight="700" fill="#1474a6" font-family="ui-monospace,Menlo,monospace">semantic join ⋈</text><path d="M768 298 L800 298" fill="none" stroke="#6d3fd4" stroke-width="1.9" marker-end="url(#a)"/><rect x="40" y="524" width="1120" height="56" rx="12" fill="#f1ebe0" stroke="#6d3fd4" stroke-width="1.4" stroke-dasharray="6 6" opacity="1"/><text x="600" y="554" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="700" fill="#4f2da0" font-family="ui-monospace,Menlo,monospace">H 契约映射：𝓘 → IR(theme) → ⟨{Σ}, 5W1H⟩ → D₁ 取数 → 𝓔</text><path d="M600 498 L600 522" fill="none" stroke="#6d3fd4" stroke-width="1.6" stroke-dasharray="3 4" marker-end="url(#a)"/><rect x="40" y="604" width="1120" height="58" rx="12" fill="#fff" stroke="#0f7a6b" stroke-width="1.4" stroke-dasharray="5 5" opacity="1"/><text x="60" y="628" text-anchor="start" font-size="11" font-weight="700" fill="#0b5e53">P17 · IR 松耦合</text><text x="60" y="645" text-anchor="start" font-size="11" font-weight="700" fill="#0b5e53">数据源变更 / 产出格式变更互不传播，只需更新 IR</text></svg>