  </defs><rect width="1200" height="880" rx="20" fill="#fffdf8"/><rect width="1200" height="880" rx="20" fill="url(#grid)" opacity=".7"/><text x="54" y="50" text-anchor="start" font-size="22" font-weight="800" fill="#221f1a">Data Wiki × Theme Wiki × IR 中间关系层 —— 组成图</text><text x="54" y="76" text-anchor="start" font-size="13" font-weight="400" fill="#6b6357">两个 wiki 各自是散落、不对齐、非表格的子域容器（同图 7 σ_out 视觉语言）；</text><text x="54" y="95" text-anchor="start" font-size="13" font-weight="400" fill="#6b6357">IR 是唯一显式耦合点：给定 theme，查 semantic join 命中集 + 5W+1H，其余部分保持正交独立（P17）。</text><rect x="40" y="128" width="360" height="340" rx="12" fill="#fbfaf6" stroke="#e6dfd1" stroke-width="1.6" opacity="1" filter="url(#sh)"/><text x="56" y="152" text-anchor="start" font-size="12" font-weight="700" fill="#6b6357" font-family="ui-monospace,Menlo,monospace">Data Wiki（承 D2）—— 数据是什么</text><rect x="60" y="170" width="150" height="56" rx="10" fill="#ddeff8" stroke="#1474a6" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="70" y="193.52" text-anchor="start" font-size="11.5" font-weight="800" fill="#0f5e87">Σ(销售流水)</text><text x="70" y="208.52" text-anchor="start" font-size="9.6" font-weight="400" fill="#0f5e87">summary·σ·κ·FK</text><rect x="230" y="162" width="150" height="50" rx="10" fill="#f6efdf" stroke="#9a6a12" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="240" y="183" text-anchor="start" font-size="11.5" font-weight="800" fill="#7a530d">Σ(库存表)</text><text x="240" y="198" text-anchor="start" font-size="9.6" font-weight="400" fill="#7a530d">summary·σ·κ·FK</text><rect x="56" y="244" width="160" height="56" rx="10" fill="#e3f4f0" stroke="#0f7a6b" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="66" y="267.52" text-anchor="start" font-size="11.5" font-weight="800" fill="#0b5e53">Σ(CRM客户)</text><text x="66" y="282.52" text-anchor="start" font-size="9.6" font-weight="400" fill="#0b5e53">summary·σ·κ·FK</text><rect x="236" y="260" width="144" height="60" rx="10" fill="#fbe7d3" stroke="#bc5a16" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="246" y="285.2" text-anchor="start" font-size="11.5" font-weight="800" fill="#9a4d12">Σ(供应链)</text><text x="246" y="300.2" text-anchor="start" font-size="9.6" font-weight="400" fill="#9a4d12">summary·σ·κ·FK</text><rect x="80" y="334" width="270" height="56" rx="10" fill="#fff2e6" stroke="#bc5a16" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="90" y="357.52" text-anchor="start" font-size="11.5" font-weight="800" fill="#9a4d12">月度报表规范</text><text x="90" y="372.52" text-anchor="start" font-size="9.6" font-weight="400" fill="#9a4d12">来源·频率·维护·时效</text><rect x="800" y="128" width="360" height="340" rx="12" fill="#fbfaf6" stroke="#e6dfd1" stroke-width="1.6" opacity="1" filter="url(#sh)"/><text x="816" y="152" text-anchor="start" font-size="12" font-weight="700" fill="#6b6357" font-family="ui-monospace,Menlo,monospace">Theme Wiki（承 D3 产出侧）—— 产出该长什么样</text><rect x="820" y="170" width="160" height="54" rx="10" fill="#ddeff8" stroke="#1474a6" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="830" y="192.68" text-anchor="start" font-size="11.5" font-weight="800" fill="#0f5e87">季度报表模板</text><text x="830" y="207.68" text-anchor="start" font-size="9.6" font-weight="400" fill="#0f5e87">σ_out·报表子域</text><rect x="998" y="164" width="144" height="48" rx="10" fill="#f6efdf" stroke="#9a6a12" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="1008" y="184.16" text-anchor="start" font-size="11.5" font-weight="800" fill="#7a530d">KPI 图表模板</text><text x="1008" y="199.16" text-anchor="start" font-size="9.6" font-weight="400" fill="#7a530d">σ_out·图表子域</text><rect x="818" y="242" width="150" height="54" rx="10" fill="#e3f4f0" stroke="#0f7a6b" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="828" y="264.68" text-anchor="start" font-size="11.5" font-weight="800" fill="#0b5e53">董事会 PPT</text><text x="828" y="279.68" text-anchor="start" font-size="9.6" font-weight="400" fill="#0