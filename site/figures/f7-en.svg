  </defs><rect width="1200" height="760" rx="20" fill="#fffdf8"/><rect width="1200" height="760" rx="20" fill="url(#grid)" opacity=".7"/><text x="54" y="50" text-anchor="start" font-size="22" font-weight="800" fill="#221f1a">Dual-Subgoal Reward Training Loop — from Goal to Benchmark Verification</text><text x="54" y="76" text-anchor="start" font-size="13" font-weight="400" fill="#6b6357">The Harness decomposes the goal into subgoals (org chart); positive/negative examples</text><text x="54" y="95" text-anchor="start" font-size="13" font-weight="400" fill="#6b6357">run in parallel to fill independent, non-aligned subdomain chips, each scored by its own benchmark (P15).</text><rect x="247" y="114" width="320" height="58" rx="12" fill="#f4eeff" stroke="#6d3fd4" stroke-width="1.8" opacity="1" filter="url(#sh)"/><text x="407" y="138.36" text-anchor="middle" dominant-baseline="middle" font-size="14.5" font-weight="800" fill="#4f2da0">User goal</text><text x="407" y="155.76" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="400" fill="#6b6357">screen band-gap≈1.3eV candidates · reproducible report</text><path d="M407 172 L407 186" fill="none" stroke="#6d3fd4" stroke-width="1.8"/><path d="M108.5 186 L703.5 186" fill="none" stroke="#6d3fd4" stroke-width="1.8"/><path d="M108.5 186 L108.5 214" fill="none" stroke="#6d3fd4" stroke-width="1.8" marker-end="url(#a)"/><rect x="54" y="214" width="109" height="52" rx="12" fill="#fff" stroke="#6d3fd4" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="108.5" y="240" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="700" fill="#4f2da0">search</text><path d="M227.5 186 L227.5 214" fill="none" stroke="#6d3fd4" stroke-width="1.8" marker-end="url(#a)"/><rect x="173" y="214" width="109" height="52" rx="12" fill="#fff" stroke="#6d3fd4" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="227.5" y="240" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="700" fill="#4f2da0">candidates</text><path d="M346.5 186 L346.5 214" fill="none" stroke="#6d3fd4" stroke-width="1.8" marker-end="url(#a)"/><rect x="292" y="214" width="109" height="52" rx="12" fill="#fff" stroke="#6d3fd4" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="346.5" y="240" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="700" fill="#4f2da0">properties</text><path d="M465.5 186 L465.5 214" fill="none" stroke="#6d3fd4" stroke-width="1.8" marker-end="url(#a)"/><rect x="411" y="214" width="109" height="52" rx="12" fill="#fff" stroke="#6d3fd4" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="465.5" y="240" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="700" fill="#4f2da0">screen</text><path d="M584.5 186 L584.5 214" fill="none" stroke="#6d3fd4" stroke-width="1.8" marker-end="url(#a)"/><rect x="530" y="214" width="109" height="52" rx="12" fill="#fff" stroke="#6d3fd4" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="584.5" y="240" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="700" fill="#4f2da0">analyze</text><path d="M703.5 186 L703.5 214" fill="none" stroke="#6d3fd4" stroke-width="1.8" marker-end="url(#a)"/><rect x="649" y="214" width="109" height="52" rx="12" fill="#fff" stroke="#6d3fd4" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="703.5" y="240" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="700" fill="#4f2da0">report</text><path d="M407 266 L407 288" fill="none" stroke="#6b6357" stroke-width="1.6" stroke-dasharray="3 4" marker-end="url(#a)"/><text x="54" y="292" text-anchor="start" font-size="12.5" font-weight="700" fill="#6b6357" font-family="ui-monospace,Menlo,monospace">Sequential rollout: positive / negative</text><rect x="54" y="300" width="330" height="88" rx="12" fill="#e6f4ec" stroke="#1a7d52" stroke-width="1.7" opacity="1" filter="url(#sh)"/><circle cx="80" cy="326" r="15" fill="#1a7d52" stroke="#fff" stroke-width="2"/><text x="80" y="327" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="800" fill="#fff">1</text><text x="100" y="331" text-anchor="start" font-size="13" font-weight="800" fill="#11603d">Positive rollout E⁺</text><text x="100" y="351" text-anchor="start" font-size="10.5" font-weight="400" fill="#11603d">Successful trajectory: hit candidate · sane value</text><text x="100" y="367" text-anchor="start" font-size="10.5" font-weight="400" fill="#11603d">→ preserve behaviors that already work</text><rect x="428" y="300" width="330" height="88" rx="12" fill="#fdecec" stroke="#c14545" stroke-width="1.7" opacity="1" filter="url(#sh)"/><circle cx="454" cy="326" r="15" fill="#c14545" stroke="#fff" stroke-width="2"/><text x="454" y="327" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="800" fill="#fff">2</text><text x="474" y="331" text-anchor="start" font-size="13" font-weight="800" fill="#9a2f2f">Negative rollout E⁻</text><text x="474" y="351" text-anchor="start" font-size="10.5" font-weight="400" fill="#9a2f2f">Failed trajectory: wrong source · format drift</text><text x="474" y="367" text-anchor="start" font-size="10.5" font-weight="400" fill="#9a2f2f">→ propose missing/corrective rules</text><path d="M384 326 L428 326" fill="none" stroke="#6b6357" stroke-width="1.8" marker-end="url(#a)"/><text x="406" y="292" text-anchor="start" font-size="10.3" font-weight="400" fill="#6b6357">Both trajectory types fill subdomains below in parallel</text><rect x="54" y="428" width="706" height="220" rx="12" fill="#fbfaf6" stroke="#e6dfd1" stroke-width="1.6" opacity="1" filter="url(#sh)"/><text x="70" y="452" text-anchor="start" font-size="12" font-weight="700" fill="#6b6357" font-family="ui-monospace,Menlo,monospace">σ_out formatted output — each subdomain independent, unaligned, not a table</text><rect x="80" y="466" width="206" height="64" rx="10" fill="#ddeff8" stroke="#1474a6" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="90" y="492.88" text-anchor="start" font-size="11.5" font-weight="800" fill="#0f5e87">Numeric subdomain</text><text x="90" y="507.88" text-anchor="start" font-size="9.6" font-weight="400" fill="#0f5e87">band-gap value · tolerance match</text><rect x="304" y="458" width="224" height="52" rx="10" fill="#f6efdf" stroke="#9a6a12" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="314" y="479.84" text-anchor="start" font-size="11.5" font-weight="800" fill="#7a530d">Summary subdomain</text><text x="314" y="494.84" text-anchor="start" font-size="9.6" font-weight="400" fill="#7a530d">content summary · rubric/LLM-judge</text><rect x="552" y="470" width="186" height="58" rx="10" fill="#e3f4f0" stroke="#0f7a6b" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="562" y="494.36" text-anchor="start" font-size="11.5" font-weight="800" fill="#0b5e53">Citation subdomain</text><text x="562" y="509.36" text-anchor="start" font-size="9.6" font-weight="400" fill="#0b5e53">retrieval hit rate · evidence_ref</text><rect x="94" y="542" width="180" height="56" rx="10" fill="#fbe7d3" stroke="#bc5a16" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="104" y="565.52" text-anchor="start" font-size="11.5" font-weight="800" fill="#9a4d12">Structure subdomain</text><text x="104" y="580.52" text-anchor="start" font-size="9.6" font-weight="400" fill="#9a4d12">table/field completeness</text><rect x="294" y="562" width="190" height="48" rx="10" fill="#e6f4ec" stroke="#1a7d52" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="304" y="582.16" text-anchor="start" font-size="11.5" font-weight="800" fill="#11603d">Chart subdomain</text><text x="304" y="597.16" text-anchor="start" font-size="9.6" font-weight="400" fill="#11603d">visualization · axis checks</text><rect x="512" y="544" width="226" height="64" rx="10" fill="#ece4fb" stroke="#6d3fd4" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="522" y="570.88" text-anchor="start" font-size="11.5" font-weight="800" fill="#4f2da0">Format subdomain</text><text x="522" y="585.88" text-anchor="start" font-size="9.6" font-weight="400" fill="#4f2da0">citation style · output schema</text><path d="M219 388 L219 412 L144 412 L144 426" fill="none" stroke="#1a7d52" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#g)"/><path d="M593 388 L593 412 L354 412 L354 426" fill="none" stroke="#c14545" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#r)"/><path d="M219 388 L219 412 L614 412 L614 426" fill="none" stroke="#1a7d52" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#g)"/><path d="M407 648 L407 670" fill="none" stroke="#1474a6" stroke-width="1.8" stroke-dasharray="3 4" marker-end="url(#a)"/><circle cx="407" cy="690" r="20" fill="#fff" stroke="#1474a6" stroke-width="1.8"/><text x="407" y="691" text-anchor="middle" dominant-baseline="middle" font-size="17" font-weight="800" fill="#1474a6">Σ</text><text x="435" y="695" text-anchor="start" font-size="10.5" font-weight="700" fill="#1474a6" font-family="ui-monospace,Menlo,monospace">Σ w_d·r_d</text><rect x="800" y="114" width="346" height="542" rx="12" fill="#fbfaf6" stroke="#e6dfd1" stroke-width="1.4" opacity="1" filter="url(#sh)"/><text x="818" y="140" text-anchor="start" font-size="11" font-weight="400" fill="#6b6357" font-family="ui-monospace,Menlo,monospace">OPTIMIZER MODEL</text><rect x="816" y="158" width="314" height="92" rx="12" fill="#f4eeff" stroke="#6d3fd4" stroke-width="1.4" opacity="1" filter="url(#sh)"/><text x="834" y="182" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">Reflection</text><text x="834" y="201" text-anchor="start" font-size="10.3" font-weight="400" fill="#4f2da0">Optimizer model reads success/failure minibatches</text><text x="834" y="216" text-anchor="start" font-size="10.3" font-weight="400" fill="#4f2da0">proposes bounded add/delete/replace edits</text><text x="818" y="272" text-anchor="start" font-size="12" font-weight="700" fill="#221f1a">Verify: per-subdomain benchmark</text><rect x="816" y="286" width="314" height="94" rx="12" fill="#ddeff8" stroke="#1474a6" stroke-width="1.7" opacity="1" filter="url(#sh)"/><text x="834" y="310" text-anchor="start" font-size="12.5" font-weight="800" fill="#0f5e87">r_out outcome subgoal</text><text x="834" y="329" text-anchor="start" font-size="10" font-weight="400" fill="#0f5e87">Independent benchmark per subdomain</text><text x="834" y="344" text-anchor="start" font-size="10" font-weight="400" fill="#0f5e87">Aggregate: Σ w_d·r_d(output_d,benchmark_d)</text><rect x="816" y="388" width="314" height="94" rx="12" fill="#fff2e6" stroke="#bc5a16" stroke-width="1.7" opacity="1" filter="url(#sh)"/><text x="834" y="412" text-anchor="start" font-size="12.5" font-weight="800" fill="#9a4d12">r_proc process subgoal</text><text x="834" y="431" text-anchor="start" font-size="10" font-weight="400" fill="#9a4d12">Were the right tools/data sources called?</text><text x="834" y="446" text-anchor="start" font-size="10" font-weight="400" fill="#9a4d12">logical analysis · met next-step criteria?</text><path d="M973 250 L973 286" fill="none" stroke="#6d3fd4" stroke-width="2.1" marker-end="url(#a)"/><path d="M973 380 L973 388" fill="none" stroke="#6d3fd4" stroke-width="1.6" stroke-dasharray="3 4" marker-end="url(#a)"/><path d="M427 690 L780 690 L780 333 L816 333" fill="none" stroke="#1474a6" stroke-width="1.8" marker-end="url(#a)"/><rect x="800" y="498" width="346" height="88" rx="12" fill="#e3f4f0" stroke="#0f7a6b" stroke-width="1.8" opacity="1" filter="url(#sh)"/><text x="818" y="522" text-anchor="start" font-size="12.5" font-weight="800" fill="#0b5e53">Dual-axis validation gate</text><text x="818" y="542" text-anchor="start" font-size="10" font-weight="400" fill="#0b5e53">r=α·r_out+β·r_proc improves → accept</text><text x="818" y="557" text-anchor="start" font-size="10" font-weight="400" fill="#0b5e53">else reject → rejected-edit buffer</text><path d="M973 482 L973 498" fill="none" stroke="#0f7a6b" stroke-width="2.1" marker-end="url(#a)"/><rect x="800" y="602" width="346" height="54" rx="12" fill="#fff" stroke="#0f7a6b" stroke-width="1.4" stroke-dasharray="5 5" opacity="1"/><text x="818" y="624" text-anchor="start" font-size="10.6" font-weight="700" fill="#0b5e53">P15 · dual-subgoal decomposition</text><text x="818" y="640" text-anchor="start" font-size="10.6" font-weight="700" fill="#0b5e53">sharpens attribution, speeds convergence</text><path d="M800 566 L780 566 L780 186 L567 186" fill="none" stroke="#bc5a16" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#o)"/><text x="766" y="668" text-anchor="middle" dominant-baseline="middle" font-size="10" font-weight="700" fill="#9a4d12" transform="rotate(-90 766 668)">Below threshold → back to decomposition</text></svg>