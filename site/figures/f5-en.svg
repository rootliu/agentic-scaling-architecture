<svg viewBox="0 0 1200 860" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif"><defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" fill="none" stroke="#efe8db" stroke-width="1"/></pattern>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="3" stdDeviation="4.5" flood-color="#3c2d14" flood-opacity=".11"/></filter>
    <marker id="a" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#6d3fd4"/></marker><marker id="g" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#1a7d52"/></marker><marker id="o" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#bc5a16"/></marker><marker id="t" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#1474a6"/></marker><marker id="k" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#6b6357"/></marker>
  </defs><rect width="1200" height="860" rx="20" fill="#fffdf8"/><rect width="1200" height="860" rx="20" fill="url(#grid)" opacity=".7"/><text x="54" y="52" text-anchor="start" font-size="23" font-weight="800" fill="#221f1a">Eight Kinds of Tool — One Capsule Interface</text><text x="54" y="80" text-anchor="start" font-size="13.5" font-weight="400" fill="#6b6357">The Harness is not just “a bag of tools”. All eight kinds expose the SAME intent + I/O contract to the LLM; they differ only in implementation and governance.</text><rect x="70" y="116" width="1060" height="48" rx="13" fill="#f4eeff" stroke="#6d3fd4" stroke-width="1.6" opacity="1"/><text x="600" y="140" text-anchor="middle" dominant-baseline="middle" font-size="13.5" font-weight="800" fill="#4f2da0">CapabilityCapsule — intent + I/O contract (what the LLM sees)</text><rect x="70" y="176" width="1060" height="32" rx="9" fill="#fbfaf6" stroke="#cabfa8" stroke-width="1.2" opacity="1"/><text x="600" y="192" text-anchor="middle" dominant-baseline="middle" font-size="11.5" font-weight="700" fill="#6b6357">O1 tool selection · intent-scoped top-k over all 8 kinds</text><path d="M600 208 L600 236" fill="none" stroke="#6d3fd4" stroke-width="1.6" marker-end="url(#a)"/><rect x="57" y="244" width="258" height="116" rx="13" fill="#e6f4ec" stroke="#1a7d52" stroke-width="1.5" opacity="1" filter="url(#sh)"/><circle cx="83" cy="270" r="15" fill="#1a7d52"/><text x="83" y="271" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="800" fill="#fff">T1</text><text x="107" y="275" text-anchor="start" font-size="13" font-weight="800" fill="#11603d">Standard tool</text><text x="75" y="304" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">web search · fetch · calculator · code</text><text x="75" y="319" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">exec</text><rect x="333" y="244" width="258" height="116" rx="13" fill="#fbe7d3" stroke="#bc5a16" stroke-width="1.5" opacity="1" filter="url(#sh)"/><circle cx="359" cy="270" r="15" fill="#bc5a16"/><text x="359" y="271" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="800" fill="#fff">T2</text><text x="383" y="275" text-anchor="start" font-size="13" font-weight="800" fill="#9a4d12">Model tool</text><text x="351" y="304" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">fine-tuned OCR · classifier · embedding</text><text x="351" y="319" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">· rerank</text><rect x="609" y="244" width="258" height="116" rx="13" fill="#ece4fb" stroke="#6d3fd4" stroke-width="1.5" opacity="1" filter="url(#sh)"/><circle cx="635" cy="270" r="15" fill="#6d3fd4"/><text x="635" y="271" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="800" fill="#fff">T3</text><text x="659" y="275" text-anchor="start" font-size="13" font-weight="800" fill="#4f2da0">Crystallized skill</text><text x="627" y="304" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">reusable, skill-verified code-loop (N7)</text><rect x="885" y="244" width="258" height="116" rx="13" fill="#ddeff8" stroke="#1474a6" stroke-width="1.5" opacity="1" filter="url(#sh)"/><circle cx="911" cy="270" r="15" fill="#1474a6"/><text x="911" y="271" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="800" fill="#fff">T4</text><text x="935" y="275" text-anchor="start" font-size="13" font-weight="800" fill="#0f5e87">Data-theme query</text><text x="903" y="304" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">ext: TianYanCha · GitHub · arXiv / int:</text><text x="903" y="319" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">roster · org · quota · territory</text><rect x="57" y="382" width="258" height="116" rx="13" fill="#f4eeff" stroke="#6d3fd4" stroke-width="1.5" opacity="1" filter="url(#sh)"/><circle cx="83" cy="408" r="15" fill="#6d3fd4"/><text x="83" y="409" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="800" fill="#fff">T5</text><text x="107" y="413" text-anchor="start" font-size="13" font-weight="800" fill="#4f2da0">Harness meta-tool</text><text x="75" y="442" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">compact · recap · writeback · retrieve</text><text x="75" y="457" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">· fork (LLM-invoked)</text><rect x="333" y="382" width="258" height="116" rx="13" fill="#fbe7d3" stroke="#bc5a16" stroke-width="1.5" opacity="1" filter="url(#sh)"/><circle cx="359" cy="408" r="15" fill="#bc5a16"/><text x="359" y="409" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="800" fill="#fff">T6</text><text x="383" y="413" text-anchor="start" font-size="13" font-weight="800" fill="#9a4d12">Scaffold command</text><text x="351" y="442" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">bash · file (read/write/edit) · process</text><text x="351" y="457" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">· network</text><rect x="609" y="382" width="258" height="116" rx="13" fill="#eef7e6" stroke="#5a8c1a" stroke-width="1.5" opacity="1" filter="url(#sh)"/><circle cx="635" cy="408" r="15" fill="#5a8c1a"/><text x="635" y="409" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="800" fill="#fff">T7</text><text x="659" y="413" text-anchor="start" font-size="13" font-weight="800" fill="#3f6410">Human-in-the-loop</text><text x="627" y="442" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">ask · confirm · approve — human as a</text><text x="627" y="457" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">callable capability</text><rect x="885" y="382" width="258" height="116" rx="13" fill="#eeeafc" stroke="#6d3fd4" stroke-width="1.5" opacity="1" filter="url(#sh)"/><circle cx="911" cy="408" r="15" fill="#6d3fd4"/><text x="911" y="409" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="800" fill="#fff">T8</text><text x="935" y="413" text-anchor="start" font-size="13" font-weight="800" fill="#4f2da0">Ephemeral code tool</text><text x="903" y="442" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">LLM writes a program on the fly (O5) —</text><text x="903" y="457" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">not yet crystallized</text><rect x="70" y="518" width="1060" height="68" rx="12" fill="#f1ebe0" stroke="#cabfa8" stroke-width="1.2" stroke-dasharray="6 6" opacity="1"/><text x="90" y="540" text-anchor="start" font-size="11.5" font-weight="400" fill="#221f1a">T8 → T3: an on-the-fly generated tool becomes a reusable skill after verify + reward-gate + generalization. Sub-agent derivation splits into {Scaffold +X</text><text x="90" y="556" text-anchor="start" font-size="11.5" font-weight="400" fill="#221f1a">(compute) | T8 (generated tool) | N6 code-loop (dispatch)} — not a separate kind. New vs. prior enums: T2 (model-as-tool) &amp; T5 (LLM-invoked maintenance).</text></svg>