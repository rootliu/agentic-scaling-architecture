rker-end="url(#g)"/><path d="M407 648 L407 670" fill="none" stroke="#1474a6" stroke-width="1.8" stroke-dasharray="3 4" marker-end="url(#a)"/><circle cx="407" cy="690" r="20" fill="#fff" stroke="#1474a6" stroke-width="1.8"/><text x="407" y="691" text-anchor="middle" dominant-baseline="middle" font-size="17" font-weight="800" fill="#1474a6">Σ</text><text x="435" y="695" text-anchor="start" font-size="10.5" font-weight="700" fill="#1474a6" font-family="ui-monospace,Menlo,monospace">Σ w_d·r_d</text><rect x="800" y="114" width="346" height="542" rx="12" fill="#fbfaf6" stroke="#e6dfd1" stroke-width="1.4" opacity="1" filter="url(#sh)"/><text x="818" y="140" text-anchor="start" font-size="11" font-weight="400" fill="#6b6357" font-family="ui-monospace,Menlo,monospace">OPTIMIZER MODEL</text><rect x="816" y="158" width="314" height="92" rx="12" fill="#f4eeff" stroke="#6d3fd4" stroke-width="1.4" opacity="1" filter="url(#sh)"/><text x="834" y="182" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">反思 reflection</text><text x="834" y="201" text-anchor="start" font-size="10.3" font-weight="400" fill="#4f2da0">优化器模型分析成功/失败 minibatch</text><text x="834" y="216" text-anchor="start" font-size="10.3" font-weight="400" fill="#4f2da0">提出 bounded add/delete/replace 编辑</text><text x="818" y="272" text-anchor="start" font-size="12" font-weight="700" fill="#221f1a">验证：分域 benchmark</text><rect x="816" y="286" width="314" height="94" rx="12" fill="#ddeff8" stroke="#1474a6" stroke-width="1.7" opacity="1" filter="url(#sh)"/><text x="834" y="310" text-anchor="start" font-size="12.5" font-weight="800" fill="#0f5e87">r_out 结果子目标</text><text x="834" y="329" text-anchor="start" font-size="10" font-weight="400" fill="#0f5e87">每个子域独立标注 benchmark</text><text x="834" y="344" text-anchor="start" font-size="10" font-weight="400" fill="#0f5e87">汇总：Σ w_d·r_d(output_d,benchmark_d)</text><rect x="816" y="388" width="314" height="94" rx="12" fill="#fff2e6" stroke="#bc5a16" stroke-width="1.7" opacity="1" filter="url(#sh)"/><text x="834" y="412" text-anchor="start" font-size="12.5" font-weight="800" fill="#9a4d12">r_proc 过程子目标</text><text x="834" y="431" text-anchor="start" font-size="10" font-weight="400" fill="#9a4d12">工具/数据源调用是否正确</text><text x="834" y="446" text-anchor="start" font-size="10" font-weight="400" fill="#9a4d12">逻辑分析·是否达进阶标准</text><path d="M973 250 L973 286" fill="none" stroke="#6d3fd4" stroke-width="2.1" marker-end="url(#a)"/><path d="M973 380 L973 388" fill="none" stroke="#6d3fd4" stroke-width="1.6" stroke-dasharray="3 4" marker-end="url(#a)"/><path d="M427 690 L780 690 L780 333 L816 333" fill="none" stroke="#1474a6" stroke-width="1.8" marker-end="url(#a)"/><rect x="800" y="498" width="346" height="88" rx="12" fill="#e3f4f0" stroke="#0f7a6b" stroke-width="1.8" opacity="1" filter="url(#sh)"/><text x="818" y="522" text-anchor="start" font-size="12.5" font-weight="800" fill="#0b5e53">双维 validation gate</text><text x="818" y="542" text-anchor="start" font-size="10" font-weight="400" fill="#0b5e53">r=α·r_out+β·r_proc 提升 → accept</text><text x="818" y="557" text-anchor="start" font-size="10" font-weight="400" fill="#0b5e53">否则 reject → rejected-edit buffer</text><path d="M973 482 L973 498" fill="none" stroke="#0f7a6b" stroke-width="2.1" marker-end="url(#a)"/><rect x="800" y="602" width="346" height="54" rx="12" fill="#fff" stroke="#0f7a6b" stroke-width="1.4" stroke-dasharray="5 5" opacity="1"/><text x="818" y="624" text-anchor="start" font-size="10.6" font-weight="700" fill="#0b5e53">P15 · 双子目标分解</text><text x="818" y="640" text-anchor="start" font-size="10.6" font-weight="700" fill="#0b5e53">提升归因清晰度、加速收敛</text><path d="M800 566 L780 566 L780 186 L567 186" fill="none" stroke="#bc5a16" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#o)"/><text x="766" y="668" text-anchor="middle" dominant-baseline="middle" font-size="10" font-weight="700" fill="#9a4d12" transform="rotate(-90 766 668)">未达阈值 → 回到目标分解，重新切分/重跑</text></svg>