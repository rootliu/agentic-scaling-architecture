  </defs><rect width="1200" height="760" rx="20" fill="#fffdf8"/><rect width="1200" height="760" rx="20" fill="url(#grid)" opacity=".7"/><text x="54" y="50" text-anchor="start" font-size="22" font-weight="800" fill="#221f1a">双子目标 Reward 训练环 — 从 goal 到验证 benchmark</text><text x="54" y="76" text-anchor="start" font-size="13" font-weight="400" fill="#6b6357">Harness 把 goal 分解成子目标（组织图）；正/反例顺序执行，把结果并行填进</text><text x="54" y="95" text-anchor="start" font-size="13" font-weight="400" fill="#6b6357">「格式化输出」容器里彼此独立、不对齐的子域小格 —— 每个子域各自的 benchmark 独立打分（P15）。</text><rect x="247" y="114" width="320" height="58" rx="12" fill="#f4eeff" stroke="#6d3fd4" stroke-width="1.8" opacity="1" filter="url(#sh)"/><text x="407" y="138.36" text-anchor="middle" dominant-baseline="middle" font-size="14.5" font-weight="800" fill="#4f2da0">用户 goal</text><text x="407" y="155.76" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="400" fill="#6b6357">筛选带隙≈1.3eV材料·写可复现报告</text><path d="M407 172 L407 186" fill="none" stroke="#6d3fd4" stroke-width="1.8"/><path d="M108.5 186 L703.5 186" fill="none" stroke="#6d3fd4" stroke-width="1.8"/><path d="M108.5 186 L108.5 214" fill="none" stroke="#6d3fd4" stroke-width="1.8" marker-end="url(#a)"/><rect x="54" y="214" width="109" height="52" rx="12" fill="#fff" stroke="#6d3fd4" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="108.5" y="240" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="700" fill="#4f2da0">检索</text><path d="M227.5 186 L227.5 214" fill="none" stroke="#6d3fd4" stroke-width="1.8" marker-end="url(#a)"/><rect x="173" y="214" width="109" height="52" rx="12" fill="#fff" stroke="#6d3fd4" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="227.5" y="240" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="700" fill="#4f2da0">候选</text><path d="M346.5 186 L346.5 214" fill="none" stroke="#6d3fd4" stroke-width="1.8" marker-end="url(#a)"/><rect x="292" y="214" width="109" height="52" rx="12" fill="#fff" stroke="#6d3fd4" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="346.5" y="240" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="700" fill="#4f2da0">取物性</text><path d="M465.5 186 L465.5 214" fill="none" stroke="#6d3fd4" stroke-width="1.8" marker-end="url(#a)"/><rect x="411" y="214" width="109" height="52" rx="12" fill="#fff" stroke="#6d3fd4" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="465.5" y="240" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="700" fill="#4f2da0">筛选</text><path d="M584.5 186 L584.5 214" fill="none" stroke="#6d3fd4" stroke-width="1.8" marker-end="url(#a)"/><rect x="530" y="214" width="109" height="52" rx="12" fill="#fff" stroke="#6d3fd4" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="584.5" y="240" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="700" fill="#4f2da0">分析</text><path d="M703.5 186 L703.5 214" fill="none" stroke="#6d3fd4" stroke-width="1.8" marker-end="url(#a)"/><rect x="649" y="214" width="109" height="52" rx="12" fill="#fff" stroke="#6d3fd4" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="703.5" y="240" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="700" fill="#4f2da0">报告</text><path d="M407 266 L407 288" fill="none" stroke="#6b6357" stroke-width="1.6" stroke-dasharray="3 4" marker-end="url(#a)"/><text x="54" y="292" text-anchor="start" font-size="12.5" font-weight="700" fill="#6b6357" font-family="ui-monospace,Menlo,monospace">顺序执行：正例 / 反例</text><rect x="54" y="300" width="330" height="88" rx="12" fill="#e6f4ec" stroke="#1a7d52" stroke-width="1.7" opacity="1" filter="url(#sh)"/><circle cx="80" cy="326" r="15" fill="#1a7d52" stroke="#fff" stroke-width="2"/><text x="80" y="327" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="800" fill="#fff">1</text><text x="100" y="331" text-anchor="start" font-size="13" font-weight="800" fill="#11603d">正例 rollout E⁺</text><text x="100" y="351" text-anchor="start" font-size="10.5" font-weight="400" fill="#11603d">成功轨迹：命中候选·数值合理</text><text x="100" y="367" text-anchor="start" font-size="10.5" font-weight="400" fill="#11603d">→ 保留有效行为模式</text><rect x="428" y="300" width="330" height="88" rx="12" fill="#fdecec" stroke="#c14545" stroke-width="1.7" opacity="1" filter="url(#sh)"/><circle cx="454" cy="326" r="15" fill="#c14545" stroke="#fff" stroke-width="2"/><text x="454" y="327" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="800" fill="#fff">2</text><text x="474" y="331" text-anchor="start" font-size="13" font-weight="800" fill="#9a2f2f">反例 rollout E⁻</text><text x="474" y="351" text-anchor="start" font-size="10.5" font-weight="400" fill="#9a2f2f">失败轨迹：检索源错·格式偏差</text><text x="474" y="367" text-anchor="start" font-size="10.5" font-weight="400" fill="#9a2f2f">→ 提出缺失/纠正规则</text><path d="M384 326 L428 326" fill="none" stroke="#6b6357" stroke-width="1.8" marker-end="url(#a)"/><text x="406" y="292" text-anchor="start" font-size="10.3" font-weight="400" fill="#6b6357">两类轨迹并行填充下方各子域（非顺序依赖）</text><rect x="54" y="428" width="706" height="220" rx="12" fill="#fbfaf6" stroke="#e6dfd1" stroke-width="1.6" opacity="1" filter="url(#sh)"/><text x="70" y="452" text-anchor="start" font-size="12" font-weight="700" fill="#6b6357" font-family="ui-monospace,Menlo,monospace">σ_out 格式化输出 —— 子域各自独立、不对齐、不是表格</text><rect x="80" y="466" width="206" height="64" rx="10" fill="#ddeff8" stroke="#1474a6" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="90" y="492.88" text-anchor="start" font-size="11.5" font-weight="800" fill="#0f5e87">数字子域</text><text x="90" y="507.88" text-anchor="start" font-size="9.6" font-weight="400" fill="#0f5e87">带隙数值·容差匹配</text><rect x="304" y="458" width="224" height="52" rx="10" fill="#f6efdf" stroke="#9a6a12" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="314" y="479.84" text-anchor="start" 