<svg viewBox="0 0 1200 860" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif"><defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" fill="none" stroke="#efe8db" stroke-width="1"/></pattern>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="3" stdDeviation="4.5" flood-color="#3c2d14" flood-opacity=".11"/></filter>
    <marker id="a" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#6d3fd4"/></marker><marker id="g" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#1a7d52"/></marker><marker id="o" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#bc5a16"/></marker><marker id="t" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#1474a6"/></marker><marker id="k" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#6b6357"/></marker>
  </defs><rect width="1200" height="860" rx="20" fill="#fffdf8"/><rect width="1200" height="860" rx="20" fill="url(#grid)" opacity=".7"/><text x="54" y="52" text-anchor="start" font-size="23" font-weight="800" fill="#221f1a">Preset Workflow vs. LLM-Driven Dynamic Orchestration</text><text x="54" y="80" text-anchor="start" font-size="13.5" font-weight="400" fill="#6b6357">Both call it a “plan”. But one is a design-time configuration; the other is a runtime artifact generated by the LLM.</text><rect x="64" y="128" width="520" height="548" rx="16" fill="#f4f2ee" stroke="#9a917f" stroke-width="1.4" opacity="1"/><text x="86" y="158" text-anchor="start" font-size="16" font-weight="800" fill="#5f5748">Preset workflow</text><text x="86" y="178" text-anchor="start" font-size="11.5" font-weight="700" fill="#8a8271">dify · n8n · template agents</text><rect x="174" y="218" width="300" height="64" rx="8" fill="#e7e3da" stroke="#9a917f" stroke-width="1.4" opacity="1"/><text x="192" y="245" text-anchor="start" font-size="13" font-weight="800" fill="#4f4838">Node A</text><text x="192" y="264" text-anchor="start" font-size="10.4" font-weight="400" fill="#8a8271">tool bound at design time</text><rect x="174" y="318" width="300" height="64" rx="8" fill="#e7e3da" stroke="#9a917f" stroke-width="1.4" opacity="1"/><text x="192" y="345" text-anchor="start" font-size="13" font-weight="800" fill="#4f4838">Node B</text><text x="192" y="364" text-anchor="start" font-size="10.4" font-weight="400" fill="#8a8271">fixed next step</text><rect x="174" y="418" width="300" height="64" rx="8" fill="#e7e3da" stroke="#9a917f" stroke-width="1.4" opacity="1"/><text x="192" y="445" text-anchor="start" font-size="13" font-weight="800" fill="#4f4838">Node C</text><text x="192" y="464" text-anchor="start" font-size="10.4" font-weight="400" fill="#8a8271">fixed output</text><path d="M324 282 L324 318" fill="none" stroke="#9a917f" stroke-width="2" marker-end="url(#k)"/><path d="M324 382 L324 418" fill="none" stroke="#9a917f" stroke-width="2" marker-end="url(#k)"/><rect x="86" y="606" width="476" height="50" rx="9" fill="#ecebe5" stroke="#c9c1b2" stroke-width="1" opacity="1"/><text x="100" y="630" text-anchor="start" font-size="11" font-weight="400" fill="#6b6357">Fixed flowchart · tools bound to nodes · one path · humans edit the graph</text><text x="100" y="645" text-anchor="start" font-size="11" font-weight="400" fill="#6b6357">to change it.</text><rect x="616" y="128" width="520" height="548" rx="16" fill="#f3ecff" stroke="#6d3fd4" stroke-width="1.5" opacity="1"/><text x="638" y="158" text-anchor="start" font-size="16" font-weight="800" fill="#4f2da0">LLM-driven proactive agent</text><text x="638" y="178" text-anchor="start" font-size="11.5" font-weight="700" fill="#7a63c0">this architecture</text><rect x="638" y="198" width="476" height="44" rx="10" fill="#fff" stroke="#6d3fd4" stroke-width="1.2" opacity="1"/><text x="650" y="216" text-anchor="start" font-size="11.5" font-weight="800" fill="#4f2da0">Harness tool library (T1–T8)</text><circle cx="842" cy="220" r="13" fill="#1a7d52"/><text x="842" y="221" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="800" fill="#fff">T1</text><circle cx="877" cy="220" r="13" fill="#bc5a16"/><text x="877" y="221" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="800" fill="#fff">T2</text><circle cx="912" cy="220" r="13" fill="#6d3fd4"/><text x="912" y="221" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="800" fill="#fff">T3</text><circle cx="947" cy="220" r="13" fill="#1474a6"/><text x="947" y="221" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="800" fill="#fff">T4</text><circle cx="982" cy="220" r="13" fill="#6d3fd4"/><text x="982" y="221" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="800" fill="#fff">T5</text><circle cx="1017" cy="220" r="13" fill="#bc5a16"/><text x="1017" y="221" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="800" fill="#fff">T6</text><circle cx="1052" cy="220" r="13" fill="#5a8c1a"/><text x="1052" y="221" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="800" fill="#fff">T7</text><circle cx="1087" cy="220" r="13" fill="#6d3fd4"/><text x="1087" y="221" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="800" fill="#fff">T8</text><rect x="638" y="258" width="476" height="56" rx="10" fill="#fff" stroke="#1474a6" stroke-width="1.2" opacity="1"/><text x="654" y="281" text-anchor="start" font-size="12.5" font-weight="800" fill="#1474a6">NL intent</text><text x="654" y="298" text-anchor="start" font-size="10.2" font-weight="400" fill="#6b6357">user goal in natural language</text><rect x="638" y="328" width="476" height="56" rx="10" fill="#fff" stroke="#6d3fd4" stroke-width="1.2" opacity="1"/><text x="654" y="351" text-anchor="start" font-size="12.5" font-weight="800" fill="#6d3fd4">LLM selects + reflects</text><text x="654" y="368" text-anchor="start" font-size="10.2" font-weight="400" fill="#6b6357">pick tools from the library, re-compose; build several candidate combos</text><rect x="638" y="398" width="476" height="56" rx="10" fill="#fff" stroke="#6d3fd4" stroke-width="1.2" opacity="1"/><text x="654" y="421" text-anchor="start" font-size="12.5" font-weight="800" fill="#6d3fd4">write a new tool if missing</text><text x="654" y="438" text-anchor="start" font-size="10.2" font-weight="400" fill="#6b6357">T8 generated code formalizes the combo</text><rect x="638" y="468" width="476" height="56" rx="10" fill="#f4eeff" stroke="#6d3fd4" stroke-width="1.7" opacity="1"/><text x="654" y="491" text-anchor="start" font-size="12.5" font-weight="800" fill="#6d3fd4">orchestration code (N6)</text><text x="654" y="508" text-anchor="start" font-size="10.2" font-weight="400" fill="#6b6357">the run-specific plan — deterministic to execute, auditable</text><path d="M876 314 L876 328" fill="none" stroke="#6d3fd4" stroke-width="1.9" marker-end="url(#a)"/><path d="M876 384 L876 398" fill="none" stroke="#6d3fd4" stroke-width="1.9" marker-end="url(#a)"/><path d="M876 454 L876 468" fill="none" stroke="#6d3fd4" stroke-width="1.9" marker-end="url(#a)"/><text x="1044" y="351" text-anchor="start" font-size="11" font-weight="800" fill="#4f2da0" font-family="ui-monospace,Menlo,monospace">×N</text><rect x="638" y="606" width="476" height="50" rx="9" fill="#efe7fb" stroke="#6d3fd4" stroke-width="1" opacity="1"/><text x="652" y="630" text-anchor="start" font-size="11" font-weight="400" fill="#4f2da0">Plan generated at runtime · tools chosen from the library · many</text><text x="652" y="645" text-anchor="start" font-size="11" font-weight="400" fill="#4f2da0">candidates · a new tool is written when one is missing.</text><path d="M584 402 L616 402" fill="none" stroke="#221f1a" stroke-width="2" marker-end="url(#k)"/><rect x="64" y="696" width="1072" height="44" rx="12" fill="#fbfaf6" stroke="#cabfa8" stroke-width="1.3" stroke-dasharray="6 5" opacity="1"/><text x="600" y="720" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="800" fill="#221f1a">Design-time config  ⟶  Runtime artifact.  “preset agent”  vs  “proactive agent”.</text></svg>