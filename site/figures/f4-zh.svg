<svg viewBox="0 0 1200 860" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif"><defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" fill="none" stroke="#efe8db" stroke-width="1"/></pattern>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="3" stdDeviation="4.5" flood-color="#3c2d14" flood-opacity=".11"/></filter>
    <marker id="a" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#6d3fd4"/></marker><marker id="g" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#1a7d52"/></marker><marker id="o" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#bc5a16"/></marker><marker id="t" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#1474a6"/></marker><marker id="k" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#6b6357"/></marker>
  </defs><rect width="1200" height="860" rx="20" fill="#fffdf8"/><rect width="1200" height="860" rx="20" fill="url(#grid)" opacity=".7"/><text x="54" y="52" text-anchor="start" font-size="23" font-weight="800" fill="#221f1a">Code 即契约 — Harness 如何把 Plan 变成行动</text><text x="54" y="80" text-anchor="start" font-size="13.5" font-weight="400" fill="#6b6357">LLM 写编排代码（概率性）；runtime 运行它（确定、可审计）。这段被生成的代码，就是所谓的“确定性内核”。</text><rect x="70" y="118" width="470" height="560" rx="16" fill="#f7f2ff" stroke="#6d3fd4" stroke-width="1.3" stroke-dasharray="6 5" opacity="1"/><rect x="660" y="118" width="470" height="560" rx="16" fill="#fff6ee" stroke="#bc5a16" stroke-width="1.3" stroke-dasharray="6 5" opacity="1"/><text x="90" y="144" text-anchor="start" font-size="12" font-weight="800" fill="#4f2da0">概率性 — LLM 生成</text><text x="680" y="144" text-anchor="start" font-size="12" font-weight="800" fill="#9a4d12">确定性 — runtime 执行</text><rect x="100" y="168" width="410" height="66" rx="12" fill="#fff" stroke="#6d3fd4" stroke-width="1.2" opacity="1"/><text x="118" y="194" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">Plan</text><text x="118" y="214" text-anchor="start" font-size="10.6" font-weight="400" fill="#6b6357">NL 子目标 DAG · 验收靠 PRD</text><rect x="100" y="272" width="410" height="66" rx="12" fill="#fff" stroke="#6d3fd4" stroke-width="1.2" opacity="1"/><text x="118" y="298" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">工具 fan-out</text><text x="118" y="318" text-anchor="start" font-size="10.6" font-weight="400" fill="#6b6357">每个子目标多个候选调用（LLM 驱动）</text><rect x="100" y="376" width="410" height="66" rx="12" fill="#f4eeff" stroke="#6d3fd4" stroke-width="1.7" opacity="1"/><text x="118" y="402" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">生成编排代码</text><text x="118" y="422" text-anchor="start" font-size="10.6" font-weight="400" fill="#6b6357">dispatch + 子 agent 依赖图</text><path d="M305 234 L305 272" fill="none" stroke="#6d3fd4" stroke-width="2.1" marker-end="url(#a)"/><path d="M305 338 L305 376" fill="none" stroke="#6d3fd4" stroke-width="2.1" marker-end="url(#a)"/><rect x="690" y="168" width="410" height="152" rx="12" fill="#fbe7d3" stroke="#bc5a16" stroke-width="1.3" opacity="1"/><text x="708" y="194" text-anchor="start" font-size="13.5" font-weight="800" fill="#9a4d12">子 agent 并行执行</text><text x="708" y="214" text-anchor="start" font-size="10.6" font-weight="400" fill="#9a4d12">在 Scaffold（隔离）</text><text x="708" y="242" text-anchor="start" font-size="10.6" font-weight="800" fill="#221f1a">派生 sub-agent = 三问：</text><circle cx="712" cy="257" r="4" fill="#bc5a16"/><text x="722" y="260" text-anchor="start" font-size="10" font-weight="800" fill="#bc5a16">在哪 / 资源：</text><text x="813" y="260" text-anchor="start" font-size="10" font-weight="400" fill="#6b6357">启动 = Scaffold fork —— 新 CPU / 隔离（+X）</text><circle cx="712" cy="274" r="4" fill="#6d3fd4"/><text x="722" y="277" text-anchor="start" font-size="10" font-weight="800" fill="#6d3fd4">跑什么：</text><text x="769" y="277" text-anchor="start" font-size="10" font-weight="400" fill="#6b6357">已有工具 · 或 T8 现编程序</text><circle cx="712" cy="291" r="4" fill="#1474a6"/><text x="722" y="294" text-anchor="start" font-size="10" font-weight="800" fill="#1474a6">接线：</text><text x="758" y="294" text-anchor="start" font-size="10" font-weight="400" fill="#6b6357">N6 code-loop 派发 + 依赖</text><rect x="690" y="354" width="410" height="66" rx="12" fill="#f4eeff" stroke="#6d3fd4" stroke-width="1.7" opacity="1"/><text x="708" y="380" text-anchor="start" font-size="13.5" font-weight="800" fill="#4f2da0">verify + 筛选</text><text x="708" y="400" text-anchor="start" font-size="10.6" font-weight="400" fill="#6b6357">保留最优候选；可重放 trace</text><path d="M895 320 L895 354" fill="none" stroke="#bc5a16" stroke-width="2.1" marker-end="url(#o)"/><path d="M510 409 L600 409 L600 201 L690 201" fill="none" stroke="#6d3fd4" stroke-width="2.2" marker-end="url(#a)"/><text x="566" y="399" text-anchor="start" font-size="11" font-weight="800" fill="#4f2da0" font-family="ui-monospace,Menlo,monospace">code</text><path d="M690 387 L620 387 L620 104 L305 104 L305 168" fill="none" stroke="#bc5a16" stroke-width="1.5" stroke-dasharray="6 5" marker-end="url(#a)"/><text x="300" y="98" text-anchor="start" font-size="10.5" font-weight="700" fill="#bc5a16">不够好 → 修订 plan</text><rect x="70" y="700" width="1060" height="52" rx="13" fill="#e6f4ec" stroke="#1a7d52" stroke-width="1.4" opacity="1"/><text x="88" y="722" text-anchor="start" font-size="13" font-weight="800" fill="#11603d">Skill = 结晶的 code-loop</text><text x="88" y="740" text-anchor="start" font-size="11" font-weight="400" fill="#2c5e47">shots + 因果 trace + reward → integrated tool，跨用户共享</text><path d="M895 420 L895 700" fill="none" stroke="#1a7d52" stroke-width="1.8" marker-end="url(#g)"/><text x="907" y="560" text-anchor="start" font-size="10" font-weight="400" fill="#11603d">reward-gated → 结晶</text><rect x="70" y="762" width="1060" height="38" rx="11" fill="#f1ebe0" stroke="#6d3fd4" stroke-width="1.2" stroke-dasharray="6 6" opacity="1"/><text x="600" y="781" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#4f2da0">Skill ⊥ Harness — 只通过 code-loop 耦合，两侧各自迭代</text></svg>