<svg viewBox="0 0 1200 1000" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif"><defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" fill="none" stroke="#efe8db" stroke-width="1"/></pattern>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="3" stdDeviation="4.5" flood-color="#3c2d14" flood-opacity=".11"/></filter>
    <marker id="a" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#6d3fd4"/></marker><marker id="g" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#1a7d52"/></marker><marker id="o" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#bc5a16"/></marker><marker id="t" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#1474a6"/></marker><marker id="k" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#6b6357"/></marker><marker id="d" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#0f7a6b"/></marker><marker id="p" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#9a6a12"/></marker><marker id="r" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#c14545"/></marker>
  </defs><rect width="1200" height="1000" rx="20" fill="#fffdf8"/><rect width="1200" height="1000" rx="20" fill="url(#grid)" opacity=".7"/><text x="54" y="50" text-anchor="start" font-size="22" font-weight="800" fill="#221f1a">Skill 生命周期 — 从自然语言对话到融入 Harness 的 code 工具</text><text x="54" y="76" text-anchor="start" font-size="13" font-weight="400" fill="#6b6357">对话把步骤显式化为临时 code 工具；用户确认后，agent 把过程总结为以 goal 为根节点、</text><text x="54" y="95" text-anchor="start" font-size="13" font-weight="400" fill="#6b6357">输出格式/工具数据源/检查标准/正反例为分支的自然语言 skill；收敛后固化为 code tool 融入 Harness。</text><rect x="54" y="146" width="300" height="92" rx="12" fill="#fff" stroke="#cabfa8" stroke-width="1.4" opacity="1" filter="url(#sh)"/><text x="72" y="174" text-anchor="start" font-size="14" font-weight="800" fill="#221f1a">① 自然语言对话</text><text x="72" y="196" text-anchor="start" font-size="11" font-weight="400" fill="#6b6357">用户与 agent 逐步讨论任务</text><text x="72" y="213" text-anchor="start" font-size="11" font-weight="400" fill="#6b6357">how-to 逐步显式化</text><path d="M354 214 L394 214" fill="none" stroke="#6b6357" stroke-width="2.1" marker-end="url(#a)"/><rect x="394" y="146" width="300" height="92" rx="12" fill="#fff2e6" stroke="#bc5a16" stroke-width="1.6" opacity="1" filter="url(#sh)"/><text x="412" y="174" text-anchor="start" font-size="14" font-weight="800" fill="#9a4d12">② 生成临时 code 工具</text><text x="412" y="196" text-anchor="start" font-size="11" font-weight="400" fill="#9a4d12">把讨论中显式化的步骤</text><text x="412" y="213" text-anchor="start" font-size="11" font-weight="400" fill="#9a4d12">写成一次性脚本/函数（未定形）</text><path d="M694 214 L734 214" fill="none" stroke="#6b6357" stroke-width="2.1" marker-end="url(#a)"/><rect x="734" y="146" width="300" height="92" rx="12" fill="#fff" stroke="#cabfa8" stroke-width="1.4" stroke-dasharray="5 5" opacity="1" filter="url(#sh)"/><text x="752" y="174" text-anchor="start" font-size="14" font-weight="800" fill="#221f1a">③ 用户确认</text><text x="752" y="196" text-anchor="start" font-size="11" font-weight="400" fill="#6b6357">跑通、检查输出</text><text x="752" y="213" text-anchor="start" font-size="11" font-weight="400" fill="#6b6357">用户同意："这个过程可复用"</text><text x="54" y="278" text-anchor="start" font-size="13.5" font-weight="800" fill="#11603d">④ Agent 总结为 NL skill</text><rect x="317" y="292" width="180" height="52" rx="12" fill="#e6f4ec" stroke="#1a7d52" stroke-width="1.8" opacity="1" filter="url(#sh)"/><text x="407" y="313.84" text-anchor="middle" dominant-baseline="middle" font-size="14.5" font-weight="800" fill="#11603d">goal</text><text x="407" y="329.44" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="400" fill="#6b6357">（skill 的根）</text><path d="M407 344 L407 362" fill="none" stroke="#1a7d52" stroke-width="1.8"/><path d="M149 362 L701.5 362" fill="none" stroke="#1a7d52" stroke-width="1.8"/><path d="M149 362 L149 386" fill="none" stroke="#1a7d52" stroke-width="1.8" marker-end="url(#a)"/><rect x="54" y="386" width="190" height="94" rx="12" fill="#fff" stroke="#1474a6" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="64" y="404" text-anchor="start" font-size="10.5" font-weight="800" fill="#0f5e87">σ_out · 格式化输出</text><rect x="64" y="416" width="64" height="26" rx="7" fill="#ddeff8" stroke="#1474a6" stroke-width="1.2" opacity="1"/><text x="96" y="430" text-anchor="middle" dominant-baseline="middle" font-size="9.6" font-weight="700" fill="#0f5e87">数字</text><rect x="140" y="410" width="90" height="24" rx="7" fill="#f6efdf" stroke="#9a6a12" stroke-width="1.2" opacity="1"/><text x="185" y="423" text-anchor="middle" dominant-baseline="middle" font-size="9.6" font-weight="700" fill="#7a530d">摘要</text><rect x="76" y="446" width="150" height="22" rx="7" fill="#e3f4f0" stroke="#0f7a6b" stroke-width="1.2" opacity="1"/><text x="151" y="458" text-anchor="middle" dominant-baseline="middle" font-size="9.6" font-weight="700" fill="#0b5e53">引用</text><path d="M314.5 362 L314.5 386" fill="none" stroke="#1a7d52" stroke-width="1.8" marker-end="url(#a)"/><rect x="256" y="386" width="117" height="94" rx="12" fill="#fff" stroke="#6d3fd4" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="314.5" y="425" text-anchor="middle" dominant-baseline="middle" font-size="10.6" font-weight="700" fill="#4f2da0">工具/数据源</text><text x="314.5" y="441" text-anchor="middle" dominant-baseline="middle" font-size="10.6" font-weight="400" fill="#4f2da0">列表</text><path d="M443.5 362 L443.5 386" fill="none" stroke="#1a7d52" stroke-width="1.8" marker-end="url(#a)"/><rect x="385" y="386" width="117" height="94" rx="12" fill="#fff" stroke="#6d3fd4" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="443.5" y="425" text-anchor="middle" dominant-baseline="middle" font-size="10.6" font-weight="700" fill="#4f2da0">调用与反思</text><text x="443.5" y="441" text-anchor="middle" dominant-baseline="middle" font-size="10.6" font-weight="400" fill="#4f2da0">检查标准</text><path d="M572.5 362 L572.5 386" fill="none" stroke="#1a7d52" stroke-width="1.8" marker-end="url(#a)"/><rect x="514" y="386" width="117" height="94" rx="12" fill="#e6f4ec" stroke="#1a7d52" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="572.5" y="425" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#11603d">正例</text><text x="572.5" y="441" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="400" fill="#11603d">E⁺</text><path d="M701.5 362 L701.5 386" fill="none" stroke="#1a7d52" stroke-width="1.8" marker-end="url(#a)"/><rect x="643" y="386" width="117" height="94" rx="12" fill="#fdecec" stroke="#c14545" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="701.5" y="425" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#9a2f2f">反例</text><text x="701.5" y="441" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="400" fill="#9a2f2f">E⁻</text><rect x="800" y="382" width="346" height="134" rx="12" fill="#e3f4f0" stroke="#0f7a6b" stroke-width="1.7" opacity="1" filter="url(#sh)"/><text x="818" y="408" text-anchor="start" font-size="12.5" font-weight="800" fill="#0b5e53">⑤ 双子目标 Reward 迭代</text><text x="818" y="428" text-anchor="start" font-size="10.2" font-weight="400" fill="#0b5e53">r_out（结果子域）× r_proc（过程一致性）</text><text x="818" y="443" text-anchor="start" font-size="10.2" font-weight="400" fill="#0b5e53">（见图 7 · P15）驱动 skill 收敛</text><path d="M407 480 L407 558" fill="none" stroke="#1a7d52" stroke-width="2.1" marker-end="url(#a)"/><text x="421" y="548" text-anchor="start" font-size="11.5" font-weight="800" fill="#1a7d52" font-family="ui-monospace,Menlo,monospace">κ(s) ↑</text><path d="M149 480 L149 532" fill="none" stroke="#1474a6" stroke-width="1.6" stroke-dasharray="3 4" marker-end="url(#a)"/><circle cx="149" cy="548" r="16" fill="#fff" stroke="#1474a6" stroke-width="1.6"/><text x="149" y="549" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="800" fill="#1474a6">Σ</text><path d="M165 548 L780 548 L780 500 L800 500" fill="none" stroke="#1474a6" stroke-width="1.6" marker-end="url(#a)"/><rect x="300" y="572" width="320" height="104" rx="12" fill="#e3f4f0" stroke="#0f7a6b" stroke-width="1.8" opacity="1" filter="url(#sh)"/><text x="322" y="598" text-anchor="start" font-size="13" font-weight="800" fill="#0b5e53">⑥ 收敛部分固化为 code tool</text><text x="322" y="618" text-anchor="start" font-size="10.3" font-weight="400" fill="#0b5e53">κ(s) 达阈 → 过程编译为确定函数</text><text x="322" y="633" text-anchor="start" font-size="10.3" font-weight="400" fill="#0b5e53">（P14 · Skill-as-Code）</text><path d="M620 656 L678 656" fill="none" stroke="#0f7a6b" stroke-width="2.1" marker-end="url(#a)"/><rect x="678" y="572" width="222" height="104" rx="12" fill="#ece4fb" stroke="#6d3fd4" stroke-width="1.8" opacity="1" filter="url(#sh)"/><text x="698" y="598" text-anchor="start" font-size="13" font-weight="800" fill="#4f2da0">⑦ 融入 Harness 工具集</text><text x="698" y="618" text-anchor="start" font-size="10" font-weight="400" fill="#4f2da0">注册为 capability，供其它 agent 复用</text><text x="698" y="633" text-anchor="start" font-size="10" font-weight="400" fill="#4f2da0">（capability capsule 形态）</text><rect x="54" y="572" width="224" height="104" rx="12" fill="#fff" stroke="#cabfa8" stroke-width="1.4" stroke-dasharray="5 5" opacity="1"/><text x="72" y="598" text-anchor="start" font-size="12" font-weight="800" fill="#221f1a">未固化部分保留 NL</text><text x="72" y="618" text-anchor="start" font-size="10" font-weight="400" fill="#6b6357">reflection / 多样性校验仍用 LLM</text><text x="72" y="633" text-anchor="start" font-size="10" font-weight="400" fill="#6b6357">防止 code 化锁死泛化（§4 梯度）</text><path d="M300 624 L278 624 L278 582" fill="none" stroke="#6b6357" stroke-width="1.6" stroke-dasharray="4 4" marker-end="url(#k)"/><rect x="54" y="712" width="1092" height="44" rx="12" fill="#f1ebe0" stroke="#6d3fd4" stroke-width="1.4" stroke-dasharray="6 6" opacity="1"/><text x="72" y="738" text-anchor="start" font-size="11.2" font-weight="700" fill="#4f2da0">确定性沿生命周期单向递增：对话 → 临时代码 → NL skill（可训练）→ 固化 code（不可变）</text></svg>