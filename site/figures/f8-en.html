<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">

<body><div id="p"><svg viewBox="0 0 1200 1000" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif"><defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" fill="none" stroke="#efe8db" stroke-width="1"/></pattern>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="3" stdDeviation="4.5" flood-color="#3c2d14" flood-opacity=".11"/></filter>
    <marker id="a" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#6d3fd4"/></marker><marker id="g" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#1a7d52"/></marker><marker id="o" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#bc5a16"/></marker><marker id="t" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#1474a6"/></marker><marker id="k" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#6b6357"/></marker><marker id="d" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#0f7a6b"/></marker><marker id="p" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#9a6a12"/></marker><marker id="r" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#c14545"/></marker>
  </defs><rect width="1200" height="1000" rx="20" fill="#fffdf8"/><rect width="1200" height="1000" rx="20" fill="url(#grid)" opacity=".7"/><text x="54" y="50" text-anchor="start" font-size="22" font-weight="800" fill="#221f1a">Skill Lifecycle — from NL Dialogue to a Code Tool Folded into the Harness</text><text x="54" y="76" text-anchor="start" font-size="13" font-weight="400" fill="#6b6357">Dialogue makes steps explicit as a temporary code tool; once the user confirms, the</text><text x="54" y="95" text-anchor="start" font-size="13" font-weight="400" fill="#6b6357">agent summarizes the process into an NL skill rooted at goal, branching into output</text><text x="54" y="114" text-anchor="start" font-size="13" font-weight="400" fill="#6b6357">format / tools+data sources / check criteria / examples; converged parts compile into a Harness code tool.</text><rect x="54" y="165" width="300" height="92" rx="12" fill="#fff" stroke="#cabfa8" stroke-width="1.4" opacity="1" filter="url(#sh)"/><text x="72" y="193" text-anchor="start" font-size="14" font-weight="800" fill="#221f1a">① Natural-language dialogue</text><text x="72" y="215" text-anchor="start" font-size="11" font-weight="400" fill="#6b6357">User and agent discuss the task step by step</text><text x="72" y="232" text-anchor="start" font-size="11" font-weight="400" fill="#6b6357">how-to becomes explicit</text><path d="M354 233 L394 233" fill="none" stroke="#6b6357" stroke-width="2.1" marker-end="url(#a)"/><rect x="394" y="165" width="300" height="92" rx="12" fill="#fff2e6" stroke="#bc5a16" stroke-width="1.6" opacity="1" filter="url(#sh)"/><text x="412" y="193" text-anchor="start" font-size="14" font-weight="800" fill="#9a4d12">② Generate a temporary code tool</text><text x="412" y="215" text-anchor="start" font-size="11" font-weight="400" fill="#9a4d12">Steps made explicit in dialogue</text><text x="412" y="232" text-anchor="start" font-size="11" font-weight="400" fill="#9a4d12">become a one-off script/function (not yet a skill)</text><path d="M694 233 L734 233" fill="none" stroke="#6b6357" stroke-width="2.1" marker-end="url(#a)"/><rect x="734" y="165" width="300" height="92" rx="12" fill="#fff" stroke="#cabfa8" stroke-width="1.4" stroke-dasharray="5 5" opacity="1" filter="url(#sh)"/><text x="752" y="193" text-anchor="start" font-size="14" font-weight="800" fill="#221f1a">③ User confirms</text><text x="752" y="215" text-anchor="start" font-size="11" font-weight="400" fill="#6b6357">Runs it, checks the output</text><text x="752" y="232" text-anchor="start" font-size="11" font-weight="400" fill="#6b6357">User agrees: "this process is reusable"</text><text x="54" y="297" text-anchor="start" font-size="13.5" font-weight="800" fill="#11603d">④ Agent summarizes into an NL skill</text><rect x="317" y="311" width="180" height="52" rx="12" fill="#e6f4ec" stroke="#1a7d52" stroke-width="1.8" opacity="1" filter="url(#sh)"/><text x="407" y="332.84" text-anchor="middle" dominant-baseline="middle" font-size="14.5" font-weight="800" fill="#11603d">goal</text><text x="407" y="348.44" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="400" fill="#6b6357">(skill root)</text><path d="M407 363 L407 381" fill="none" stroke="#1a7d52" stroke-width="1.8"/><path d="M149 381 L701.5 381" fill="none" stroke="#1a7d52" stroke-width="1.8"/><path d="M149 381 L149 405" fill="none" stroke="#1a7d52" stroke-width="1.8" marker-end="url(#a)"/><rect x="54" y="405" width="190" height="94" rx="12" fill="#fff" stroke="#1474a6" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="64" y="423" text-anchor="start" font-size="10.5" font-weight="800" fill="#0f5e87">σ_out · output format</text><rect x="64" y="435" width="64" height="26" rx="7" fill="#ddeff8" stroke="#1474a6" stroke-width="1.2" opacity="1"/><text x="96" y="449" text-anchor="middle" dominant-baseline="middle" font-size="9.6" font-weight="700" fill="#0f5e87">num</text><rect x="140" y="429" width="90" height="24" rx="7" fill="#f6efdf" stroke="#9a6a12" stroke-width="1.2" opacity="1"/><text x="185" y="442" text-anchor="middle" dominant-baseline="middle" font-size="9.6" font-weight="700" fill="#7a530d">sum</text><rect x="76" y="465" width="150" height="22" rx="7" fill="#e3f4f0" stroke="#0f7a6b" stroke-width="1.2" opacity="1"/><text x="151" y="477" text-anchor="middle" dominant-baseline="middle" font-size="9.6" font-weight="700" fill="#0b5e53">cite</text><path d="M314.5 381 L314.5 405" fill="none" stroke="#1a7d52" stroke-width="1.8" marker-end="url(#a)"/><rect x="256" y="405" width="117" height="94" rx="12" fill="#fff" stroke="#6d3fd4" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="314.5" y="444" text-anchor="middle" dominant-baseline="middle" font-size="10.6" font-weight="700" fill="#4f2da0">tools/data</text><text x="314.5" y="460" text-anchor="middle" dominant-baseline="middle" font-size="10.6" font-weight="400" fill="#4f2da0">source list</text><path d="M443.5 381 L443.5 405" fill="none" stroke="#1a7d52" stroke-width="1.8" marker-end="url(#a)"/><rect x="385" y="405" width="117" height="94" rx="12" fill="#fff" stroke="#6d3fd4" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="443.5" y="444" text-anchor="middle" dominant-baseline="middle" font-size="10.6" font-weight="700" fill="#4f2da0">invocation &amp;</text><text x="443.5" y="460" text-anchor="middle" dominant-baseline="middle" font-size="10.6" font-weight="400" fill="#4f2da0">reflection criteria</text><path d="M572.5 381 L572.5 405" fill="none" stroke="#1a7d52" stroke-width="1.8" marker-end="url(#a)"/><rect x="514" y="405" width="117" height="94" rx="12" fill="#e6f4ec" stroke="#1a7d52" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="572.5" y="444" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#11603d">positive</text><text x="572.5" y="460" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="400" fill="#11603d">E⁺</text><path d="M701.5 381 L701.5 405" fill="none" stroke="#1a7d52" stroke-width="1.8" marker-end="url(#a)"/><rect x="643" y="405" width="117" height="94" rx="12" fill="#fdecec" stroke="#c14545" stroke-width="1.5" opacity="1" filter="url(#sh)"/><text x="701.5" y="444" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#9a2f2f">negative</text><text x="701.5" y="460" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="400" fill="#9a2f2f">E⁻</text><rect x="800" y="401" width="346" height="134" rx="12" fill="#e3f4f0" stroke="#0f7a6b" stroke-width="1.7" opacity="1" filter="url(#sh)"/><text x="818" y="427" text-anchor="start" font-size="12.5" font-weight="800" fill="#0b5e53">⑤ Dual-subgoal reward iteration</text><text x="818" y="447" text-anchor="start" font-size="10.2" font-weight="400" fill="#0b5e53">r_out (outcome subdomains) × r_proc (process)</text><text x="818" y="462" text-anchor="start" font-size="10.2" font-weight="400" fill="#0b5e53">(see Fig. 7 · P15) drives skill convergence</text><path d="M407 499 L407 577" fill="none" stroke="#1a7d52" stroke-width="2.1" marker-end="url(#a)"/><text x="421" y="567" text-anchor="start" font-size="11.5" font-weight="800" fill="#1a7d52" font-family="ui-monospace,Menlo,monospace">κ(s) ↑</text><path d="M149 499 L149 551" fill="none" stroke="#1474a6" stroke-width="1.6" stroke-dasharray="3 4" marker-end="url(#a)"/><circle cx="149" cy="567" r="16" fill="#fff" stroke="#1474a6" stroke-width="1.6"/><text x="149" y="568" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="800" fill="#1474a6">Σ</text><path d="M165 567 L780 567 L780 519 L800 519" fill="none" stroke="#1474a6" stroke-width="1.6" marker-end="url(#a)"/><rect x="300" y="591" width="320" height="104" rx="12" fill="#e3f4f0" stroke="#0f7a6b" stroke-width="1.8" opacity="1" filter="url(#sh)"/><text x="322" y="617" text-anchor="start" font-size="13" font-weight="800" fill="#0b5e53">⑥ Converged parts compile into a code tool</text><text x="322" y="637" text-anchor="start" font-size="10.3" font-weight="400" fill="#0b5e53">κ(s) above threshold → compiles to a deterministic fn</text><text x="322" y="652" text-anchor="start" font-size="10.3" font-weight="400" fill="#0b5e53">(P14 · Skill-as-Code)</text><path d="M620 675 L678 675" fill="none" stroke="#0f7a6b" stroke-width="2.1" marker-end="url(#a)"/><rect x="678" y="591" width="222" height="104" rx="12" fill="#ece4fb" stroke="#6d3fd4" stroke-width="1.8" opacity="1" filter="url(#sh)"/><text x="698" y="617" text-anchor="start" font-size="13" font-weight="800" fill="#4f2da0">⑦ Folded into the Harness tool set</text><text x="698" y="637" text-anchor="start" font-size="10" font-weight="400" fill="#4f2da0">Registered as a capability, reusable by other agents</text><text x="698" y="652" text-anchor="start" font-size="10" font-weight="400" fill="#4f2da0">(capability-capsule form)</text><rect x="54" y="591" width="224" height="104" rx="12" fill="#fff" stroke="#cabfa8" stroke-width="1.4" stroke-dasharray="5 5" opacity="1"/><text x="72" y="617" text-anchor="start" font-size="12" font-weight="800" fill="#221f1a">Unconverged part stays NL</text><text x="72" y="637" text-anchor="start" font-size="10" font-weight="400" fill="#6b6357">Reflection / diversity checks still use the LLM</text><text x="72" y="652" text-anchor="start" font-size="10" font-weight="400" fill="#6b6357">prevents premature code-lock (§4 gradient)</text><path d="M300 643 L278 643 L278 601" fill="none" stroke="#6b6357" stroke-width="1.6" stroke-dasharray="4 4" marker-end="url(#k)"/><rect x="54" y="731" width="1092" height="44" rx="12" fill="#f1ebe0" stroke="#6d3fd4" stroke-width="1.4" stroke-dasharray="6 6" opacity="1"/><text x="72" y="757" text-anchor="start" font-size="11.2" font-weight="700" fill="#4f2da0">Determinism increases monotonically: dialogue → temp code → NL skill (trainable) → frozen code (immutable)</text></svg></div></body></html>
