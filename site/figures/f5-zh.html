  </defs><rect width="1200" height="860" rx="20" fill="#fffdf8"/><rect width="1200" height="860" rx="20" fill="url(#grid)" opacity=".7"/><text x="54" y="52" text-anchor="start" font-size="23" font-weight="800" fill="#221f1a">八种工具 — 同一 Capsule 接口</text><text x="54" y="80" text-anchor="start" font-size="13.5" font-weight="400" fill="#6b6357">Harness 不只是「一堆工具」。八类对 LLM 暴露同一份 intent + I/O 契约，差异只在实现与治理。</text><rect x="70" y="116" width="1060" height="48" rx="13" fill="#f4eeff" stroke="#6d3fd4" stroke-width="1.6" opacity="1"/><text x="600" y="140" text-anchor="middle" dominant-baseline="middle" font-size="13.5" font-weight="800" fill="#4f2da0">CapabilityCapsule — intent + I/O 契约（LLM 看到的）</text><rect x="70" y="176" width="1060" height="32" rx="9" fill="#fbfaf6" stroke="#cabfa8" stroke-width="1.2" opacity="1"/><text x="600" y="192" text-anchor="middle" dominant-baseline="middle" font-size="11.5" font-weight="700" fill="#6b6357">O1 工具选择 · 在全部 8 类上做 intent-scoped top-k</text><path d="M600 208 L600 236" fill="none" stroke="#6d3fd4" stroke-width="1.6" marker-end="url(#a)"/><rect x="57" y="244" width="258" height="116" rx="13" fill="#e6f4ec" stroke="#1a7d52" stroke-width="1.5" opacity="1" filter="url(#sh)"/><circle cx="83" cy="270" r="15" fill="#1a7d52"/><text x="83" y="271" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="800" fill="#fff">T1</text><text x="107" y="275" text-anchor="start" font-size="13" font-weight="800" fill="#11603d">标准工具</text><text x="75" y="304" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">web search · fetch · </text><text x="75" y="319" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">计算器 · code exec</text><rect x="333" y="244" width="258" height="116" rx="13" fill="#fbe7d3" stroke="#bc5a16" stroke-width="1.5" opacity="1" filter="url(#sh)"/><circle cx="359" cy="270" r="15" fill="#bc5a16"/><text x="359" y="271" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="800" fill="#fff">T2</text><text x="383" y="275" text-anchor="start" font-size="13" font-weight="800" fill="#9a4d12">定制模型工具</text><text x="351" y="304" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">微调 OCR · 分类器 · embedd</text><text x="351" y="319" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">ing · rerank</text><rect x="609" y="244" width="258" height="116" rx="13" fill="#ece4fb" stroke="#6d3fd4" stroke-width="1.5" opacity="1" filter="url(#sh)"/><circle cx="635" cy="270" r="15" fill="#6d3fd4"/><text x="635" y="271" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="800" fill="#fff">T3</text><text x="659" y="275" text-anchor="start" font-size="13" font-weight="800" fill="#4f2da0">code 化 skill</text><text x="627" y="304" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">可复用、skill 层验证的 code-l</text><text x="627" y="319" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">oop (N7)</text><rect x="885" y="244" width="258" height="116" rx="13" fill="#ddeff8" stroke="#1474a6" stroke-width="1.5" opacity="1" filter="url(#sh)"/><circle cx="911" cy="270" r="15" fill="#1474a6"/><text x="911" y="271" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="800" fill="#fff">T4</text><text x="935" y="275" text-anchor="start" font-size="13" font-weight="800" fill="#0f5e87">数据主题查询</text><text x="903" y="304" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">外部：天眼查 · GitHub · arX</text><text x="903" y="319" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">iv / 内部：名录 · 组织 · quo</text><text x="903" y="334" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">ta · territory</text><rect x="57" y="382" width="258" height="116" rx="13" fill="#f4eeff" stroke="#6d3fd4" stroke-width="1.5" opacity="1" filter="url(#sh)"/><circle cx="83" cy="408" r="15" fill="#6d3fd4"/><text x="83" y="409" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="800" fill="#fff">T5</text><text x="107" y="413" text-anchor="start" font-size="13" font-weight="800" fill="#4f2da0">harness meta-tool</text><text x="75" y="442" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">compact · recap · wri</text><text x="75" y="457" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">teback · retrieve · f</text><text x="75" y="472" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">ork（LLM 可调用）</text><rect x="333" y="382" width="258" height="116" rx="13" fill="#fbe7d3" stroke="#bc5a16" stroke-width="1.5" opacity="1" filter="url(#sh)"/><circle cx="359" cy="408" r="15" fill="#bc5a16"/><text x="359" y="409" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="800" fill="#fff">T6</text><text x="383" y="413" text-anchor="start" font-size="13" font-weight="800" fill="#9a4d12">scaffold 能力</text><text x="351" y="442" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">bash · file（读/写/改）· p</text><text x="351" y="457" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">rocess · network</text><rect x="609" y="382" width="258" height="116" rx="13" fill="#eef7e6" stroke="#5a8c1a" stroke-width="1.5" opacity="1" filter="url(#sh)"/><circle cx="635" cy="408" r="15" fill="#5a8c1a"/><text x="635" y="409" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="800" fill="#fff">T7</text><text x="659" y="413" text-anchor="start" font-size="13" font-weight="800" fill="#3f6410">human-in-the-loop</text><text x="627" y="442" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">追问 · 确认 · 审批 —— 把人当作可</text><text x="627" y="457" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">调用的能力</text><rect x="885" y="382" width="258" height="116" rx="13" fill="#eeeafc" stroke="#6d3fd4" stroke-width="1.5" opacity="1" filter="url(#sh)"/><circle cx="911" cy="408" r="15" fill="#6d3fd4"/><text x="911" y="409" text-anchor="middle" dominant-baseline="middle" font-size="12.5" font-weight="800" fill="#fff">T8</text><text x="935" y="413" text-anchor="start" font-size="13" font-weight="800" fill="#4f2da0">即时生成 code 工具</text><text x="903" y="442" text-anchor="start" font-size="10.4" font-weight="400" fill="#6b6357">LLM 当场编写程序（O5）—— 尚未结晶</text><rect x="70" y="518" width="1060" height="68" rx="12" fill="#f1ebe0" stroke="#cabfa8" stroke-width="1.2" stroke-dasharray="6 6" opacity="1"/><text x="90" y="540" text-anchor="start" font-size="11.5" font-weight="400" fill="#221f1a">T8 → T3：即时生成的工具经 verify + reward-gate + 泛化测试后升为可复用 skill。派生 sub-agent 不是一种工具：把它「启动」是 S</text><text x="90" y="556" text-anchor="start" font-size="11.5" font-weight="400" fill="#221f1a">caffold 接口（fork = 新 CPU/隔离，+X）；它「跑什么」= 已有工具或 T8 程序；N6 code-loop 负责派发。相对原枚举新增：T2（model-</text><text x="90" y="572" text-anchor="start" font-size="11.5" font-weight="400" fill="#221f1a">as-tool）与 T5（LLM 可调用的维护）。</text></svg></div></body></html>
