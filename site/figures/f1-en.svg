<svg viewBox="0 0 1200 860" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif"><defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" fill="none" stroke="#efe8db" stroke-width="1"/></pattern>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="3" stdDeviation="4.5" flood-color="#3c2d14" flood-opacity=".11"/></filter>
    <marker id="a" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#6d3fd4"/></marker><marker id="g" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#1a7d52"/></marker><marker id="o" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#bc5a16"/></marker><marker id="t" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#1474a6"/></marker><marker id="k" markerWidth="11" markerHeight="11" refX="7.5" refY="3.6" orient="auto"><path d="M0,0 L7.5,3.6 L0,7.2 Z" fill="#6b6357"/></marker>
  </defs><rect width="1200" height="860" rx="20" fill="#fffdf8"/><rect width="1200" height="860" rx="20" fill="url(#grid)" opacity=".7"/><text x="54" y="52" text-anchor="start" font-size="23" font-weight="800" fill="#221f1a">The Three Layers — What Each One Is For</text><text x="54" y="80" text-anchor="start" font-size="13.5" font-weight="400" fill="#6b6357">A first look: an AI agent is built from three stacked layers, plus a data subsystem on the side.</text><rect x="56" y="112" width="740" height="172" rx="16" fill="#e6f4ec" stroke="#1a7d52" stroke-width="1.7" opacity="1" filter="url(#sh)"/><rect x="74" y="130" width="52" height="30" rx="8" fill="#fff" stroke="#1a7d52" stroke-width="1.4" opacity="1"/><text x="100" y="151" text-anchor="middle" font-size="16" font-weight="800" fill="#11603d">L3</text><text x="142" y="151" text-anchor="start" font-size="17" font-weight="800" fill="#11603d">Skills  —  “What to do”</text><text x="80" y="186" text-anchor="start" font-size="12.5" font-weight="400" fill="#11603d">Holds the job descriptions for tasks: the goal, the input/output format,</text><text x="80" y="205" text-anchor="start" font-size="12.5" font-weight="400" fill="#11603d">and the rules for when to act, when to stop, and when to loop.</text><text x="80" y="238" text-anchor="start" font-size="12" font-weight="700" fill="#1a7d52">Like an employee’s playbook / SOP.</text><rect x="74" y="250" width="704" height="24" rx="7" fill="#fff" stroke="#1a7d52" stroke-width="1" opacity="0.85"/><text x="84" y="267" text-anchor="start" font-size="11.5" font-weight="700" fill="#11603d">Add a Skill  →  the agent can do one more kind of task  (logical scaling)</text><rect x="56" y="300" width="740" height="172" rx="16" fill="#ece4fb" stroke="#6d3fd4" stroke-width="1.7" opacity="1" filter="url(#sh)"/><rect x="74" y="318" width="52" height="30" rx="8" fill="#fff" stroke="#6d3fd4" stroke-width="1.4" opacity="1"/><text x="100" y="339" text-anchor="middle" font-size="16" font-weight="800" fill="#4f2da0">L2</text><text x="142" y="339" text-anchor="start" font-size="17" font-weight="800" fill="#4f2da0">Harness  —  “How the work gets done”</text><text x="80" y="374" text-anchor="start" font-size="12.5" font-weight="400" fill="#4f2da0">Turns a Skill’s intent into concrete, runnable steps. Manages memory,</text><text x="80" y="393" text-anchor="start" font-size="12.5" font-weight="400" fill="#4f2da0">context, tools, code generation, safety checks and audit logs.</text><text x="80" y="426" text-anchor="start" font-size="12" font-weight="700" fill="#6d3fd4">Like a project manager + the runtime framework.</text><rect x="74" y="438" width="704" height="24" rx="7" fill="#fff" stroke="#6d3fd4" stroke-width="1" opacity="0.85"/><text x="84" y="455" text-anchor="start" font-size="11.5" font-weight="700" fill="#4f2da0">The single place where Skills and Scaffold meet  (the decoupling point)</text><rect x="56" y="488" width="740" height="172" rx="16" fill="#fbe7d3" stroke="#bc5a16" stroke-width="1.7" opacity="1" filter="url(#sh)"/><rect x="74" y="506" width="52" height="30" rx="8" fill="#fff" stroke="#bc5a16" stroke-width="1.4" opacity="1"/><text x="100" y="527" text-anchor="middle" font-size="16" font-weight="800" fill="#9a4d12">L1</text><text x="142" y="527" text-anchor="start" font-size="17" font-weight="800" fill="#9a4d12">Scaffold  —  “Where it runs, safely”</text><text x="80" y="562" text-anchor="start" font-size="12.5" font-weight="400" fill="#9a4d12">Provides the isolated place to execute: sandbox, shell, network,</text><text x="80" y="581" text-anchor="start" font-size="12.5" font-weight="400" fill="#9a4d12">storage and model-serving capacity, with security boundaries.</text><text x="80" y="614" text-anchor="start" font-size="12" font-weight="700" fill="#bc5a16">Like a secure cloud computer.</text><rect x="74" y="626" width="704" height="24" rx="7" fill="#fff" stroke="#bc5a16" stroke-width="1" opacity="0.85"/><text x="84" y="643" text-anchor="start" font-size="11.5" font-weight="700" fill="#9a4d12">Add an instance  →  more throughput  (physical scaling)</text><path d="M756 284 L756 300" fill="none" stroke="#6d3fd4" stroke-width="2.1" marker-end="url(#a)"/><path d="M756 472 L756 488" fill="none" stroke="#bc5a16" stroke-width="2.1" marker-end="url(#o)"/><rect x="820" y="112" width="324" height="548" rx="16" fill="#ddeff8" stroke="#1474a6" stroke-width="1.7" opacity="1" filter="url(#sh)"/><text x="842" y="146" text-anchor="start" font-size="16" font-weight="800" fill="#0f5e87">Data Subsystem 𝒟</text><text x="842" y="170" text-anchor="start" font-size="11.5" font-weight="400" fill="#3d7a99">What the agent knows about your data (kept</text><text x="842" y="186" text-anchor="start" font-size="11.5" font-weight="400" fill="#3d7a99">off to the side, mostly offline)</text><text x="844" y="230" font-size="11.5" fill="#1474a6" font-weight="700">›</text><text x="859" y="230" font-size="11.5" fill="#0f5e87">D₁  fetch — read the slice you need, on demand</text><text x="844" y="254" font-size="11.5" fill="#1474a6" font-weight="700">›</text><text x="859" y="254" font-size="11.5" fill="#0f5e87">D₂  semantic summary — pre-digest sources offline</text><text x="844" y="278" font-size="11.5" fill="#1474a6" font-weight="700">›</text><text x="859" y="278" font-size="11.5" fill="#0f5e87">D₃  governance — remember how to use the data</text><text x="844" y="302" font-size="11.5" fill="#1474a6" font-weight="700">›</text><text x="859" y="302" font-size="11.5" fill="#0f5e87">D₄  lifetime — freshness, scope &amp; cost budget</text><text x="844" y="326" font-size="11.5" fill="#1474a6" font-weight="700">›</text><text x="859" y="326" font-size="11.5" fill="#0f5e87">Ω   workspace — run history, artifacts, LLM wiki</text><rect x="56" y="672" width="1088" height="80" rx="14" fill="#f7f2e8" stroke="#cabfa8" stroke-width="1.3" stroke-dasharray="7 6" opacity="1"/><text x="80" y="706" text-anchor="start" font-size="13.5" font-weight="600" fill="#221f1a">Key idea: each kind of growth (more skills / more machines / more data) is added on a different axis, so they don’t slow each other down.</text></svg>